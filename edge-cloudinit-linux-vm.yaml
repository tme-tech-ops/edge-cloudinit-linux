tosca_definitions_version: dell_1_1

description: >
  This blueprint creates a Virtual Machine on a NativeEdge Endpoint and provides the VM login details.

imports:
  - dell/types/types.yaml
  - vm/definitions.yaml
  - vm/inputs.yaml
  - vm/outputs.yaml


input_groups:
  artifact:
    display_label: Deployment Artifacts
    collapsible: true
    index: 0
    inputs:
      - edge_os_image_secret
      - os_type
  vm:
    display_label: NativeEdge Virtual Machine
    collapsible: true
    index: 1
    inputs:
      - vm_name
      - vm_hostname
      - vm_user_name
      - vm_password
      - vcpus
      - memory_size
      - os_disk_size
      - disk_controller
      - disk_wrapper
      - add_disks
      - additional_disks
  network:
    display_label: Network Configuration
    collapsible: true
    index: 2
    inputs:
      - vnic_0_segment_name
      - use_dhcp
      - static_ip
      - use_gateway
      - gateway
      - use_dns
      - dns
      - use_nat
      - port_forward_rules
      - add_nics
      - additional_nics
  adv_boot:
    display_label: Advanced Boot Options
    collapsible: true
    index: 3
    inputs:
      - hardware_options.vTPM
      - hardware_options.secure_boot
      - hardware_options.firmware_type
  device_passthrough:
    display_label: Device Passthrough
    collapsible: true
    index: 4
    inputs:
      - use_passthrough
      - pcie
      - usb
      - serial_port_wrapper
      - gpu
      - video

labels:
  csys-obj-type:
    values:
      - environment
  target_environment:
    values:
      - ned
  vendor:
    values:
      - tme-tech-ops
  solution:
    values:
      - edge-cloud-init
  version:
    values:
      - "4.1.0.0"

blueprint_labels:
  env:
    values:
      - NED
