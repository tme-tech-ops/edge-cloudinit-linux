tosca_definitions_version: dell_1_1

description: >
  This blueprint creates a Virtual Machine on a NativeEdge Endpoint and provides the VM login details.

imports:
  - dell/types/types.yaml
  - vm/definitions.yaml
  - vm/inputs.yaml
  - vm/outputs.yaml
  - multi-node/definitions.yaml
  - multi-node/inputs.yaml
  - multi-node/outputs.yaml

input_groups:
  basic_vm:
    display_label: Basic Configuration
    collapsible: true
    index: 0
    inputs:
      - number_of_vms
      - edge_os_image_secret
      - os_type
      - utility_blueprint_id
      - vm_name
      - vm_hostname
      - vm_user_name
      - vm_password
      - disk_wrapper
      - vnic_0_segment_name
      - use_dhcp
      - static_ip
      - use_gateway
      - gateway
      - use_dns
      - dns
  adv_vm:
    display_label: Advanced Virtual Machine Configuration
    collapsible: true
    index: 1
    inputs:
      - hardware_options.firmware_type
      - hardware_options.secure_boot
      - hardware_options.vTPM
      - vcpus
      - memory_size
      - os_disk_size
      - disk_controller
      - add_disks
      - additional_disks
      - use_nat
      - port_forward_rules
      - add_nics
      - vm_add_nics
      - use_passthrough
      - usb_wrapper
      - gpu_wrapper
      - pcie_wrapper
      - video
      - serial_port_wrapper

