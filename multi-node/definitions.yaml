tosca_definitions_version: dell_1_1

imports:
  - dell/types/types.yaml
  - plugin:edge-plugin
  - plugin:utilities-plugin?version=>=3.1.3.0

node_templates:

  additional_server_prepare_config:
    type: dell.nodes.ApplicationModule
    interfaces:
      dell.interfaces.lifecycle:
        precreate:
          implementation: multi-node/scripts/prepare_additional_vm.py
          executor: central_deployment_agent
          inputs:
            additional_vms: { get_input: additional_vms }
            vm_user_name: { get_input: vm_user_name }
            hashed_vm_passwd: { get_attribute: [prepare_config, hashed_vm_passwd] }
            ssh_public_key:
              get_secret:
                concat:
                  - get_attribute: [ssh_keys, secret_key_name]
                  - "_public"
    relationships:
      - type: dell.relationships.depends_on
        target: prepare_config
      - type: dell.relationships.depends_on
        target: ssh_keys

  additional_server_vm:
    type: dell.nodes.ServiceComponent
    properties:
      resource_config:
        blueprint:
          external_resource: true
          id: { get_input: child_blueprint_id }
        deployment:
          inputs:
            service_tag: { get_attribute: [additional_server_prepare_config, ece_service_tag] }
            name: { get_attribute: [additional_server_prepare_config, vm_name] }
            image: { get_attribute: [binary_image, binary_details, extra, artifact_id] }
            os_type: { get_input: os_type }
            cpu: { get_attribute: [additional_server_prepare_config, vcpus] }
            memory: { get_attribute: [additional_server_prepare_config, memory_size] }
            storage: { get_attribute: [additional_server_prepare_config, os_disk_size] }
            disk: { get_attribute: [additional_server_prepare_config, disk] }
            disk_controller: { get_input: disk_controller }
            hardware_options.vTPM: { get_input: hardware_options.vTPM }
            hardware_options.secure_boot: { get_input: hardware_options.secure_boot }
            hardware_options.firmware_type: { get_input: hardware_options.firmware_type }
            enable_management: { get_input: enable_management }
            network_settings: { get_attribute: [additional_server_prepare_config, network_settings] }
            cloudinit: { get_attribute: [additional_server_prepare_config, cloudinit_config] }
            vm_user_name: { get_input: vm_user_name }
            ssh_private_key_secret:
              concat:
                - get_attribute: [ssh_keys, secret_key_name]
                - "_private"
            vm_hostname: { get_attribute: [additional_server_prepare_config, vm_hostname] }
    relationships:
      - type: dell.relationships.depends_on
        target: additional_server_prepare_config
      - type: dell.relationships.depends_on
        target: binary_image
      - type: dell.relationships.depends_on
        target: ssh_keys

  additional_server_results:
    type: dell.nodes.ApplicationModule
    interfaces:
      dell.interfaces.lifecycle:
        start:
          implementation: multi-node/scripts/collect_additional_vm_results.py
          executor: central_deployment_agent
    relationships:
      - type: dell.relationships.depends_on
        target: additional_server_vm

groups:
  additional_server_group:
    members:
      - additional_server_prepare_config
      - additional_server_vm

policies:
  additional_server_scaling:
    type: dell.policies.scaling
    properties:
      default_instances: { get_input: additional_server_count }
      min_instances: 0
      max_instances: 9
    targets: [additional_server_group]
