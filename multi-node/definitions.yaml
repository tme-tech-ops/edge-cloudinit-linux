  add_vm:
    type: dell.nodes.ServiceComponent
    properties:
      resource_config:
        blueprint:
          external_resource: true
          id: { get_input: utility_blueprint_id }
        deployment:
          inputs:
            service_tag: { get_attribute: [add_vm_prep_config, ece_service_tag] }
            name: { get_attribute: [add_vm_prep_config, vm_name] }
            image: { get_attribute: [binary_image, binary_details, extra, artifact_id] }
            os_type: { get_input: os_type }
            cpu: { get_attribute: [add_vm_prep_config, vcpus] }
            memory: { get_attribute: [add_vm_prep_config, memory_size] }
            storage: { get_attribute: [add_vm_prep_config, os_disk_size] }
            disk: { get_attribute: [add_vm_prep_config, disk] }
            disk_controller: { get_attribute: [add_vm_prep_config, disk_controller] }
            hardware_options.vTPM: { get_input: hardware_options.vTPM }
            hardware_options.secure_boot: { get_input: hardware_options.secure_boot }
            hardware_options.firmware_type: { get_input: hardware_options.firmware_type }
            enable_management: { get_input: enable_management }
            network_settings: { get_attribute: [add_vm_prep_config, network_settings] }
            cloudinit: { get_attribute: [add_vm_prep_config, cloudinit_config] }
            vm_user_name: { get_input: vm_user_name }
            ssh_private_key_secret:
              concat:
                - get_attribute: [ssh_keys, secret_key_name]
                - "_private"
            vm_hostname: { get_attribute: [add_vm_prep_config, vm_hostname] }
            additional_disks: { get_attribute: [add_vm_prep_config, additional_disks] }
            usb: { get_attribute: [add_vm_prep_config, usb] }
            serial_port: { get_attribute: [add_vm_prep_config, serial_port] }
            gpu: { get_attribute: [add_vm_prep_config, gpu] }
            video: { get_attribute: [add_vm_prep_config, video] }
            pcie: { get_attribute: [add_vm_prep_config, pcie] }
    relationships:
      - type: dell.relationships.depends_on
        target: add_vm_prep_config
      - type: dell.relationships.depends_on
        target: binary_image
      - type: dell.relationships.depends_on
        target: ssh_keys

  vm_results:
    type: dell.nodes.ApplicationModule
    interfaces:
      dell.interfaces.lifecycle:
        start:
          implementation: multi-node/scripts/collect_vm_results.py
          executor: central_deployment_agent
    relationships:
      - type: dell.relationships.depends_on
        target: base_vm
      - type: dell.relationships.depends_on
        target: add_vm

groups:
  add_vm_group:
    members:
      - add_vm_prep_config
      - add_vm

policies:
  add_vm_scaling:
    type: dell.policies.scaling
    properties:
      default_instances: { jmespath: ['sum([`-1`, @])', { get_input: number_of_vms }] }
    targets: [add_vm_group]
