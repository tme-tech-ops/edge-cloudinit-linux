inputs:

  deploy_additional_vms:
    type: boolean
    hidden: false
    display_label: Deploy Additional VMs
    description: |
      Check to deploy additional Virtual Machines.
      Requires additional_server_count and additional_vms list.
    default: false
    display:
      group: multi_node
      index: 1

  child_blueprint_id:
    type: string
    hidden: false
    only_with: deploy_additional_vms
    display_label: Child VM Blueprint ID
    description: ID of the uploaded child blueprint for additional VM deployments.
    default: edge-cloudinit-utility-vm
    display:
      group: multi_node
      index: 2

  additional_server_count:
    type: integer
    hidden: false
    only_with: deploy_additional_vms
    allow_update: false
    display_label: Number of Additional VMs
    description: |
      Number of additional VMs to deploy.
      Must match the number of entries in the Additional VM Configurations list.
    default: 0
    constraints:
      - in_range: [0, 9]
    display:
      group: multi_node
      index: 5

  additional_vms:
    type: list
    item_type: additional_vm_config
    hidden: false
    only_with: deploy_additional_vms
    allow_update: false
    display_label: Additional VM Configurations
    description: |
      List of additional VM configurations.
      Each entry defines a VM to deploy on a NativeEdge endpoint.
      The number of entries must match the Additional Server Count.
    required: false
    default: []
    display:
      group: multi_node
      index: 10

data_types:
  additional_vm_config:
    properties:
      ece_service_tag:
        type: string
        required: true
        description: >
          Service tag of the NativeEdge Endpoint where this VM will be deployed.
        display:
          index: 1
          display_name: Endpoint Service Tag
      vm_name:
        type: string
        required: true
        description: Name of the Virtual Machine.
        display:
          index: 2
          display_name: VM Name
      vm_hostname:
        type: string
        required: true
        default: 'edgehost'
        description: >
          Hostname of the Virtual Machine.
          Letters (a-z, A-Z), numbers (0-9), or hyphens (-). Max 63 characters.
        display:
          index: 3
          display_name: VM Hostname
      vcpus:
        type: integer
        required: true
        default: 2
        description: Number of virtual CPUs allocated to the VM.
        display:
          index: 4
          display_name: vCPUs
      memory_size:
        type: string
        required: true
        default: '4GB'
        description: Memory size with unit [KB,MB,GB,TB,PB,EB,ZB,YB].
        display:
          index: 5
          display_name: Memory Size
      os_disk_size:
        type: string
        required: true
        default: '50GB'
        description: OS Disk size with unit [KB,MB,GB,TB,PB,EB,ZB,YB].
        display:
          index: 6
          display_name: OS Disk Size
      disk:
        type: string
        required: true
        default: '/DataStore0'
        description: >
          Datastore path on the target Endpoint. (e.g. /DataStore0)
        display:
          index: 7
          display_name: Datastore Path
      segment_name:
        type: string
        required: true
        description: >
          Virtual Network Segment name for the primary NIC.
          Must match a segment configured on the target Endpoint.
        display:
          index: 8
          display_name: Network Segment
      use_dhcp:
        type: boolean
        required: true
        default: true
        description: Use DHCP for the primary NIC. If false, static_ip is required.
        display:
          index: 9
          display_name: Use DHCP
      static_ip:
        type: string
        required: false
        default: ''
        description: >
          Static IP Address in CIDR notation (e.g. 192.168.0.100/24).
          Required when Use DHCP is false.
        display:
          index: 10
          display_name: Static IP/CIDR
      gateway:
        type: string
        required: false
        default: ''
        description: Gateway IP address (e.g. 192.168.0.1).
        display:
          index: 11
          display_name: Gateway
      dns:
        type: string
        required: false
        default: ''
        description: >
          Comma-separated list of DNS server IPs (e.g. 8.8.8.8,8.8.4.4).
        display:
          index: 12
          display_name: DNS Servers
