inputs:

  # ==================== VM 2 ====================

  deployment_id_02:
    type: deployment_id
    hidden: false
    allow_update: false
    display_label: 'Endpoint location for VM #2'
    description: |
      The Endpoint where the Virtual Machine will be created.
    constraints:
    - labels:
      - cloud: nativeedge
    display:
      group: multi_node
      index: 1
    required: false
    only_with:
      number_of_vms:
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
      - 9
      - 10

  vm_2_name:
    type: string
    hidden: false
    display_label: 'VM #2 Name'
    description: |
      Name of the Virtual Machine
    default: edge-cloud-init-02
    display:
      group: multi_node
      index: 2
    required: false
    only_with:
      number_of_vms:
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
      - 9
      - 10

  vm_2_hostname:
    type: string
    hidden: false
    display_label: 'VM #2 Hostname'
    description: |
      Hostname of the Virtual Machine
      Cannot contain characters other than:
      letters (a-z, A-Z), numbers (0-9), or hyphens (-).
      Can be up to 63 characters long.
    constraints:
    - pattern: ^(?!-)[a-zA-Z0-9-]{1,63}(?<!-)$
      error_message: |
        Must be letters (a-z, A-Z), numbers (0-9), or hyphens (-).
        No more than 64 characters.
    - max_length: 64
    default: edgehost-02
    display:
      group: multi_node
      index: 3
    required: false
    only_with:
      number_of_vms:
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
      - 9
      - 10

  vm_2_vcpus:
    type: integer
    hidden: false
    allow_update: true
    display_label: 'VM #2 vCPUs'
    description: Number of virtual CPUs allocated to the Virtual Machine.
    default: 2
    constraints:
    - greater_or_equal: 2
    display:
      group: multi_node
      index: 15
    only_with:
      number_of_vms:
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
      - 9
      - 10

  vm_2_memory_size:
    type: string
    hidden: false
    allow_update: true
    display_label: 'VM #2 Memory Size'
    description: Memory size with unit [KB,MB,GB,TB,PB,EB,ZB,YB].
    default: 4GB
    constraints:
    - pattern: '\d+(\.\d+)?(KB|MB|GB|TB|PB|EB|ZB|YB)'
      error_message: |
        Incorrect format.
        Memory size must be followed by unit [KB,MB,GB,TB,PB,EB,ZB,YB].
        Example: 4GB
    display:
      group: multi_node
      index: 20
    only_with:
      number_of_vms:
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
      - 9
      - 10

  vm_2_os_disk_size:
    type: string
    hidden: false
    allow_update: true
    display_label: 'VM #2 OS Disk Size'
    description: Storage size with unit [KB,MB,GB,TB,PB,EB,ZB,YB].
    default: 50GB
    required: true
    constraints:
    - pattern: '\d+(\.\d+)?(KB|MB|GB|TB|PB|EB|ZB|YB)'
      error_message: |
        Incorrect format.
        Disk size must be followed by unit [KB,MB,GB,TB,PB,EB,ZB,YB].
        Example: 50GB
    display:
      group: multi_node
      index: 25
    only_with:
      number_of_vms:
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
