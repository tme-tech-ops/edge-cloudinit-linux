    type: deployment_id
    hidden: false
    allow_update: false
    display_label: 'Endpoint location for VM #9'
    description: |
      The Endpoint where the Virtual Machine will be created.
    constraints:
    - labels:
      - cloud: nativeedge
    display:
      group: multi_node
      index: 1
    required: false
    only_with:
      number_of_vms:
      - 9
      - 10

  vm_9_name:
    type: string
    hidden: false
    display_label: 'VM #9 Name'
    description: |
      Name of the Virtual Machine
    default: edge-cloud-init-09
    display:
      group: multi_node
      index: 2
    required: false
    only_with:
      number_of_vms:
      - 9
      - 10

  vm_9_hostname:
    type: string
    hidden: false
    display_label: 'VM #9 Hostname'
    description: |
      Hostname of the Virtual Machine
      Cannot contain characters other than:
      letters (a-z, A-Z), numbers (0-9), or hyphens (-).
      Can be up to 63 characters long.
    constraints:
    - pattern: ^(?!-)[a-zA-Z0-9-]{1,63}(?<!-)$
      error_message: |
        Must be letters (a-z, A-Z), numbers (0-9), or hyphens (-).
        No more than 64 characters.
    - max_length: 64
    default: edgehost-09
    display:
      group: multi_node
      index: 3
    required: false
    only_with:
      number_of_vms:
      - 9
      - 10

  vm_9_vcpus:
    type: integer
    hidden: false
    allow_update: true
    display_label: 'VM #9 vCPUs'
    description: Number of virtual CPUs allocated to the Virtual Machine.
    default: 2
    constraints:
    - greater_or_equal: 2
    display:
      group: multi_node
      index: 15
    only_with:
      number_of_vms:
      - 9
      - 10

  vm_9_memory_size:
    type: string
    hidden: false
    allow_update: true
    display_label: 'VM #9 Memory Size'
    description: Memory size with unit [KB,MB,GB,TB,PB,EB,ZB,YB].
    default: 4GB
    constraints:
    - pattern: '\d+(\.\d+)?(KB|MB|GB|TB|PB|EB|ZB|YB)'
      error_message: |
        Incorrect format.
        Memory size must be followed by unit [KB,MB,GB,TB,PB,EB,ZB,YB].
        Example: 4GB
    display:
      group: multi_node
      index: 20
    only_with:
      number_of_vms:
      - 9
      - 10

  vm_9_os_disk_size:
    type: string
    hidden: false
    allow_update: true
    display_label: 'VM #9 OS Disk Size'
    description: Storage size with unit [KB,MB,GB,TB,PB,EB,ZB,YB].
    default: 50GB
    required: true
    constraints:
    - pattern: '\d+(\.\d+)?(KB|MB|GB|TB|PB|EB|ZB|YB)'
      error_message: |
        Incorrect format.
        Disk size must be followed by unit [KB,MB,GB,TB,PB,EB,ZB,YB].
        Example: 50GB
    display:
      group: multi_node
      index: 25
    only_with:
      number_of_vms:
      - 9
      - 10

  vm_9_disk_controller:
    type: string
    display_label: 'VM #9 Disk Controller'
    allow_update: true
    description: >
      Deployment disk controller.
    default: VIRTIO
    hidden: false
    constraints:
      - valid_values:
          - 'VIRTIO'
          - 'SATA'
          - 'SCSI'
    display:
      group: multi_node
      index: 30
    only_with:
      number_of_vms:
      - 9
      - 10

  vm_9_disk_wrapper:
    type: string
    hidden: false
    display_label: 'VM #9 DataStore Path'
    required: true
    allow_update: false
    description: >
      Deployment datastore path on target Endpoint. (i.e. /DataStore0)
    constraints:
      - valid_values:
          jmespath:
          - extra.hw_core.storage.dataStoreOrVolumes[?((((type=='SSD'||type=='HDD')&&name.contains(@,'DataStore'))||(shared&&name=='/Shared_DataStore'))&&status=='ONLINE')].mountPath
          - get_inventory:
              get_capability:
              - get_input: deployment_id_09
              - ece_service_tag
    display:
      group: multi_node
      index: 35
    only_with:
      number_of_vms:
      - 9
      - 10

  vm_9_vnic_0_segment_name:
    type: string
    hidden: false
    allow_update: true
    required: true
    display_label: 'VM #9 Virtual Network Segment name for Primary Interface'
    description: Name of the Virtual Network Segment.
    constraints:
    - valid_values:
        jmespath:
        - extra.hw_core.network.virtualSegment[?type=='NAT'||type=='BRIDGE'].name
        - get_inventory:
            get_capability:
            - get_input: deployment_id_09
            - ece_service_tag
    display:
      group: multi_node
      index: 40
    only_with:
      number_of_vms:
      - 9
      - 10

  vm_9_use_dhcp:
    type: boolean
    hidden: false
    display_label: 'VM #9 Use DHCP'
    description: |
      If false, then static ip must be configured with optional DNS and Gateway.
    default: true
    display:
      group: multi_node
      index: 45
    only_with:
      number_of_vms:
      - 9
      - 10

  vm_9_static_ip:
    type: string
    hidden: false
    exclusive_with: vm_9_use_dhcp
    display_label: 'VM #9 Static IP in CIDR notation'
    description: |
      Static IP Address in CIDR notation that will be assigned to the VM
      Example: 192.168.0.100/24
    constraints:
    - pattern: '^(?:((25[0-5]|2[0-4]\d|1\d\d|\d{1,2})(\.(25[0-5]|2[0-4]\d|1\d\d|\d{1,2})){3})\/(3[0-2]|[12]?\d)|)$'
      error_message: |
        Invalid format for IP Address in CIDR format.
        Example: 172.16.0.1/16
    required: false
    display:
      group: multi_node
      index: 50

  vm_9_use_gateway:
    type: boolean
    hidden: false
    exclusive_with: vm_9_use_dhcp
    display_label: 'VM #9 Use Gateway'
    description: |
      If false, Gateway will not be configured
    default: false
    display:
      group: multi_node
      index: 55

  vm_9_gateway:
    type: string
    hidden: false
    only_with: vm_9_use_gateway
    display_label: 'VM #9 Gateway IP'
    description: IP address of the default gateway.
    required: false
    constraints:
    - pattern: ^((25[0-5]|(2[0-4]|1\d|[1-9]|)\d)\.?\b){4}$|^$
      error_message: |
        Invalid format for IP Address.
        Example: 172.16.0.1
    display:
      group: multi_node
      index: 60

  vm_9_use_dns:
    type: boolean
    hidden: false
    exclusive_with: vm_9_use_dhcp
    display_label: 'VM #9 Use DNS'
    description: |
      If false, DNS will not be configured
    default: false
    display:
      group: multi_node
      index: 65

  vm_9_dns:
    type: list
    hidden: false
    only_with: vm_9_use_dns
    display_label: 'VM #9 DNS Servers'
    description: List of DNS servers to use.
    required: false
    default: []
    display:
      group: multi_node
      index: 70

  vm_9_use_nat:
    type: boolean
    hidden: false
    display_label: 'VM #9 Enable NAT Port Forwarding'
    description: |
      Enable to define NAT Port Forwarding rules (Only use with NAT Segment)
    default: false
    display:
      group: multi_node
      index: 75
    only_with:
      number_of_vms:
      - 9
      - 10

  vm_9_port_forward_rules:
    type: list
    hidden: false
    only_with: vm_9_use_nat
    item_type: vm_9_port_forward_rules
    description: |
      Leave vm_ip blank and fill in host_ip, vm_port, protocol, host_port, and service_type
      Example for SSH: {host_ip:IP_OF_NAT Interface,vm_port:22,protocol:TCP,host_port:9999,service_type:SSH}
    required: false
    display_label: 'VM #9 Port Mapping'
    default: []
    display:
      group: multi_node
      index: 80

  vm_9_add_nics:
    type: boolean
    hidden: false
    display_label: 'VM #9 Add Network Interfaces'
    description: |
      Check to add list of additional network interfaces
    default: false
    display:
      group: multi_node
      index: 85
    only_with:
      number_of_vms:
      - 9
      - 10

  vm_9_vm_add_nics:
    type: list
    item_type: vm_9_vm_add_nics
    hidden: false
    allow_update: false
    only_with: vm_9_add_nics
    display_label: 'VM #9 Additional Network Interfaces'
    description: >
      List of additional NICs (up to 9) beyond the primary NIC.
      Each NIC requires a segment name and network configuration.
    required: false
    default: []
    display:
      group: multi_node
      index: 90

  vm_9_add_disks:
    type: boolean
    hidden: false
    allow_update: false
    display_label: 'VM #9 Add Disks'
    description: |
      Check to add a list of additional disks
    default: false
    display:
      group: multi_node
      index: 95
    only_with:
      number_of_vms:
      - 9
      - 10

  vm_9_additional_disks:
    type: list
    item_type: vm_9_additional_disks
    hidden: false
    allow_update: false
    only_with: vm_9_add_disks
    display_label: 'VM #9 Optional list of additional Virtual Disks'
    description: >
      List of additional virtual disks to be created.
    required: false
    default: []
    display:
      group: multi_node
      index: 100

  vm_9_use_passthrough:
    type: boolean
    hidden: false
    display_label: 'VM #9 Enable device passthrough'
    description: |
      Uncheck to define usb, serial, gpu, video, and pcie devices for VM passthrough
    default: false
    display:
      group: multi_node
      index: 105
    only_with:
      number_of_vms:
      - 9
      - 10

  vm_9_usb_wrapper:
    type: list
    item_type: string
    hidden: false
    only_with: vm_9_use_passthrough
    allow_update: false
    display_label: 'VM #9 USB Device list'
    description: >
      A list of USB logical names (string). USB-1 to USB-10 for Passthrough.
    required: false
    constraints:
    - valid_values:
        jmespath:
        - extra.hw_core.usbDevice[*].logicalName
        - get_inventory:
            get_capability:
            - get_input: deployment_id_09
            - ece_service_tag
    default: []
    display:
      group: multi_node
      index: 110

  vm_9_gpu_wrapper:
    type: list
    item_type: string
    hidden: false
    only_with: vm_9_use_passthrough
    display_label: 'VM #9 GPU Passthrough'
    description: >
      GPU passthrough. A list of GPU logical names (string). NVIDIA_A2-Slot1 to
      NVIDIA_A2-Slot8, NVIDIA_A30-Slot1 to NVIDIA_A30-Slot8
    required: false
    constraints:
    - valid_values:
        jmespath:
        - "extra.hw_core.pciDevice[?deviceType=='GPU'].logicalName"
        - get_inventory:
            get_capability:
            - get_input: deployment_id_09
            - ece_service_tag
    default: []
    display:
      group: multi_node
      index: 115

  vm_9_pcie_wrapper:
    type: list
    item_type: string
    display_label: 'VM #9 PCIe Passthrough'
    hidden: false
    only_with: vm_9_use_passthrough
    description: >
      PCIe passthrough. A list of PCIe logical names.
    required: false
    constraints:
    - valid_values:
        jmespath:
        - extra.hw_core.pciDevice[*].logicalName
        - get_inventory:
            get_capability:
            - get_input: deployment_id_09
            - ece_service_tag
    default: []
    display:
      group: multi_node
      index: 120

  vm_9_video:
    type: list
    item_type: string
    hidden: false
    only_with: vm_9_use_passthrough
    display_label: 'VM #9 Video Passthrough'
    description: >
      Video passthrough. A list of Video logical names (string). E.g. 'Onboard
      Controller'
    required: false
    constraints:
    - valid_values:
        - "onboard controller"
    default: []
    display:
      group: multi_node
      index: 125

  vm_9_serial_port_wrapper:
    type: list
    item_type: string
    hidden: false
    only_with: vm_9_use_passthrough
    allow_update: false
    display_label: 'VM #9 Serial Port'
    description: |
      Serial port passthrough. PORT_MODE format (e.g. COM-1_RS-232)
    required: false
    default: []
    constraints:
      - valid_values:
          jmespath:
          - '[extra.hw_core.serialPorts[*].{"port":logicalName,"mode":`RS-232`}[*].values(@).join(`_`,@)[],extra.hw_core.serialPorts[*].{"port":logicalName,"mode":`RS-422`}[*].values(@).join(`_`,@)[],extra.hw_core.serialPorts[*].{"port":logicalName,"mode":`RS-485`}[*].values(@).join(`_`,@)[]][]'
          - get_inventory:
              get_capability:
              - get_input: deployment_id_09
              - ece_service_tag
    display:
      group: multi_node
      index: 130

