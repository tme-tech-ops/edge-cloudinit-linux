    only_with: vm_10_use_passthrough
    display_label: 'VM #10 GPU Passthrough'
    description: >
      GPU passthrough. A list of GPU logical names (string). NVIDIA_A2-Slot1 to
      NVIDIA_A2-Slot8, NVIDIA_A30-Slot1 to NVIDIA_A30-Slot8
    required: false
    constraints:
    - valid_values:
        jmespath:
        - "extra.hw_core.pciDevice[?deviceType=='GPU'].logicalName"
        - get_inventory:
            get_capability:
            - get_input: deployment_id_10
            - ece_service_tag
    default: []
    display:
      group: multi_node
      index: 115

  vm_10_pcie_wrapper:
    type: list
    item_type: string
    display_label: 'VM #10 PCIe Passthrough'
    hidden: false
    only_with: vm_10_use_passthrough
    description: >
      PCIe passthrough. A list of PCIe logical names.
    required: false
    constraints:
    - valid_values:
