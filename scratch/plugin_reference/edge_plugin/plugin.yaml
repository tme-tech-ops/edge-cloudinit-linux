plugins:
  nativeedge:
    executor: central_deployment_agent
    package_name: nativeedge-plugin
    package_version: 3.2.0.0.208
data_types:
  nativeedge.types.VMDeployConstraints:
    properties:
      cpu:
        description: Number of CPUs
        type: integer
        default: 2
      disk:
        description: Deployment datastore path on target ECE. Available datastores
          can be retrieved from inventory service
        type: string
        default: /DataStore0
      memory:
        description: Memory with unit [KB,MB,GB,TB,PB,EB,ZB,YB]
        type: string
        default: 2GB
      storage:
        description: Storage size with unit [KB,MB,GB,TB,PB,EB,ZB,YB]
        type: string
        default: 4GB
      controller:
        description: Deployment disk controller on target ECE ['VIRTIO', 'SCSI', 'SATA']
        type: string
        required: false
  nativeedge.types.VMDeployHardwareOptions:
    properties:
      vTPM:
        description: Enable vTPM. Required for Win11 OS, optional for other OS
        type: boolean
        required: false
        default: false
      secure_boot:
        description: Enable secure boot. Required for Win11 OS, optional for other
          OS
        type: boolean
        required: false
        default: false
      firmware_type:
        description: Firmware type, one of [BIOS, UEFI]. For Win11 OS, it must be
          UEFI
        type: string
        required: false
        default: BIOS
  nativeedge.types.VMDeployPortforwardRules:
    properties:
      service_type:
        description: Service Type, one of [SSH, HTTP, or user-defined custom type]
        type: string
      protocol:
        description: One of [TCP, UDP]
        type: string
      host_ip:
        description: Host IP
        type: string
      host_port:
        description: Host port
        type: integer
      vm_ip:
        description: VM IP, not available during deployment
        type: string
        required: false
      vm_port:
        description: VM port
        type: integer
        required: false
  nativeedge.types.VMDeployNetworkSettings:
    properties:
      name:
        description: Name of VNIC (VNIC1-10)
        type: string
      segment_name:
        description: Use default segment name if value is not passed in
        type: string
        required: false
      vm_mac:
        description: Network MAC address
        type: string
        required: false
      model_type:
        type: string
        description: Model Type
        required: false
      port_fwd_rules:
        description: Rules for port forwarding. A list of VMDeployPortforwardRules
        type: list
        item_type: nativeedge.types.VMDeployPortforwardRules
        required: false
  nativeedge.types.VMDeploySerialPort:
    properties:
      port:
        description: Serial port. COM-1 to COM-10
        type: string
      mode:
        description: Serial port mode, one of [RS-232, RS-422, RS-485]
        type: string
        required: false
      serial_console:
        description: Enable console logs from VM (ttyS0) on serial port
        type: boolean
        required: false
        default: true
  nativeedge.types.VMDeployPorts:
    properties:
      usb:
        description: USB passthrough. A list of USB logical names (string). E.g. ['USB-1']
        type: list
        required: false
        default: []
      serial_port:
        description: 'Serial port passthrough. A list of serial port object. E.g.
          [{''port'': ''COM-1'', ''mode'': ''RS-232''}]'
        type: list
        required: false
        default: []
      gpu:
        description: GPU passthrough. A list of GPU logical names (string). E.g. ['NVIDIA
          Corporation L4']
        type: list
        required: false
        default: []
      video:
        description: Video passthrough. Accepted value is ['onboarded-controller'].
        type: list
        required: false
        default: []
      pcie:
        description: PCIe passthrough. A list of PCIe logical names (string). E.g.
          ['SUNIX Co., Ltd. Multiport serial controller']
        type: list
        required: false
        default: []
  nativeedge.types.VMDeployFilesRef:
    properties:
      filename:
        type: string
        required: true
        description: Filename
      controller:
        type: string
        required: false
        description: Type of virtual disk controller ['VIRTIO', 'SCSI', 'SATA']
  nativeedge.types.VMDeployAdditionalDisksRef:
    properties:
      image:
        type: nativeedge.types.VMDeployFilesRef
        required: true
        description: Image file reference
      storage:
        type: string
        required: false
        description: Storage size in bytes
  nativeedge.types.VMDeployDefinition:
    properties:
      location:
        description: ECE service tag - only supports single deployment
        type: string
      name:
        description: Deployment name
        type: string
      retries:
        description: Retry Number
        type: integer
        default: 3
      image:
        description: Reference to catalog / archiva image
        type: string
        required: false
      image_location:
        description: Config needed to provision VM using external sources
        type: nativeedge.types.VMImageLocation
        required: false
      os_type:
        description: OS type
        type: string
      resource_constraints:
        description: ''
        type: nativeedge.types.VMDeployConstraints
      hardware_options:
        description: ''
        type: nativeedge.types.VMDeployHardwareOptions
        required: false
      enable_management:
        description: Enable management which will create tap interface for infrastructure
          segment
        type: boolean
        required: false
        default: false
      network_settings:
        description: List of VMDeployNetworkSettings
        type: list
        required: false
      ports:
        description: Passthrough ports
        type: nativeedge.types.VMDeployPorts
        required: false
      cloudinit:
        description: Cloud init cloud config (yaml) or script - users is responsible
          to construct the valid cloudinit. If cloudinit is specified, sshKeys and
          customParam will be ignored
        type: string
        required: false
      ssh_keys:
        description: Public key(s) to be stored in VM for ssh access (default user
          is root). Field will be ignored if cloudinit is specified
        type: string
        required: false
      custom_parameters:
        description: Field will be ignored if cloudinit is specified
        type: dict
        required: false
      iso_files:
        description: ISO files to be downloaded before VM provisioning, references
          to catalog. A list of string.
        type: list
        required: false
      iso_files_ref:
        description: List of ISO files reference
        type: list
        required: false
      boot_order:
        description: Boot order
        type: list
        required: false
      additional_disks:
        description: Additional disk images to be downloaded before VM provisioning,
          references to catalog. A list of artifact details.
        type: list
        required: false
      additional_disks_ref:
        description: List of additional disks reference
        type: list
        required: false
      download_timeout:
        description: download timeout defined by user
        type: integer
        default: 0
      advanced_hypervisor_parameters:
        description: Advanced Hypervisor Parameters
        type: dict
        required: false
      deployment_type:
        description: Indicate the type of deployment, default create'
        type: string
        required: false
        default: create
  nativeedge.types.Config:
    properties:
      apikey:
        description: 'Old Mist API key. Not required. This is kept for non-breaking
          transition before this is removed from all blueprints

          '
        type: string
        required: false
  nativeedge.types.AppVMDeploy:
    properties:
      template:
        description: template id
        type: string
      retries:
        description: retry number
        type: integer
        default: 3
      download_timeout:
        description: download timeout defined by user
        type: integer
        default: 0
      description:
        description: deploy description
        type: string
      location:
        description: ECE service tag - only supports single deployment
        type: string
      name:
        description: Deployment name
        type: string
      resource_constraints:
        description: ''
        type: nativeedge.types.VMDeployConstraints
      hardware_options:
        description: ''
        type: nativeedge.types.VMDeployHardwareOptions
        required: false
      network_settings:
        description: List of VMDeployNetworkSettings
        type: list
        required: false
      ports:
        description: Passthrough ports
        type: nativeedge.types.VMDeployPorts
        required: false
      cloudinit:
        description: Cloud init cloud config (yaml) or script - users is responsible
          to construct the valid cloudinit. If cloudinit is specified, sshKeys and
          customParam will be ignored
        type: string
        required: false
        default: ''
      ssh_keys:
        description: Public key(s) to be stored in VM for ssh access (default user
          is root). Field will be ignored if cloudinit is specified
        type: string
        required: false
        default: ''
      custom_parameters:
        description: Field will be ignored if cloudinit is specified
        type: dict
        required: false
      advanced_hypervisor_parameters:
        description: Advanced Hypervisor Parameters
        type: dict
        required: false
  nativeedge.types.ArtifactConfig:
    properties:
      path:
        description: URL of the external repo
        type: string
      username:
        description: Username of the external repo
        type: string
        required: false
        default: ''
      access_token:
        description: Access token of the external repo
        type: string
        required: false
        default: ''
      description:
        description: Artifact description
        type: string
        required: false
        default: ''
      artifact_type:
        description: Artifact type of Local or External
        type: string
        required: false
        default: EXTERNAL
  nativeedge.types.BinaryImageConfig:
    properties:
      artifact:
        description: Artifact config
        type: nativeedge.types.ArtifactConfig
      version:
        description: Binary image version
        type: string
      artifact_type:
        description: ''
        type: string
        required: false
        default: VM_IMAGE
      description:
        description: Binary image description
        type: string
        required: false
        default: ''
      developer:
        description: Developer name
        type: string
        required: false
        default: NativeEdge
      name:
        description: Binary image name, if not specified the image name from repo
          URL will be used
        type: string
        required: false
        default: ''
      tags:
        description: Binary image tags
        type: list
        required: false
        default: []
  nativeedge.types.NativeEdgeComposeDefinition:
    properties:
      name:
        description: Compose deployment name
        type: string
        required: false
      compose:
        description: Yaml payload
        type: string
      environment_variables:
        description: Environment variables to replace the variables in compose yaml
        type: dict
        required: false
  nativeedge.types.NativeEdgeComposeConfig:
    properties:
      service_tag:
        description: ECE service tag
        type: string
      definition:
        description: Deployment definition
        type: nativeedge.types.NativeEdgeComposeDefinition
  nativeedge.types.RegistryConfig:
    properties:
      credentials:
        description: 'List of registry config in the format of list, ie: [''registry_url'':
          '''', ''username'': '''', ''password'': '''', ''tls_verify'': true]'
        type: list
        required: false
        default: []
  nativeedge.datatypes.SoftwarePackageConfig:
    properties:
      package_name:
        description: Software package name, such as nginx etc, not unique.
        type: string
        required: true
      unique_key:
        description: Unique software package key, format is <package_name>_<version>
          will be used as the key to get result URL from capabilities. Such as nginx_0.1
          etc.
        type: string
        required: true
      type:
        description: Original software package type, such as tarball, image, manifest
          etc.
        type: string
        required: true
      url:
        description: Package full download url, like for binary files, is https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.0.3/kustomize_v5.0.3_linux_amd64.tar.gz.
          For docker image, is ghcr.io/dexidp/dex:v2.36.0. For the special package
          which is pre-uploaded to EO, the url should be set as 'uploaded'. Plugin
          will identify it and query the actual download path from catalog service.
        type: string
        required: true
      version:
        description: Package version, such as for docker image is tag value, for a
          binary file is version value etc.
        type: string
        required: false
        default: ''
      secret_key:
        description: Optional, secret for saving the username/password to access the
          external repository if is required. For binary file, use secret type 'Binary
          Configuration', plugin only fetch user and token from it. Url and version
          can be any value. And one secret could be used for multi binary files here.
          For image, use secret type 'Docker Configuration'. Also one secret could
          be used for multi images here.
        type: string
        required: false
        default: ''
  nativeedge.datatypes.SoftwarePackages:
    properties:
      software_packages:
        description: List of SoftwarePackageConfig.
        type: list
        required: true
        default: []
  nativeedge.datatypes.OxyServerSoftwarePackages:
    derived_from: nativeedge.datatypes.SoftwarePackages
    properties:
      oxy_server_id:
        description: Unique Identifier of the Oxy Server.
        required: false
        type: string
        default: ''
      oxy_server_url:
        description: Url of the Oxy Server.
        required: false
        type: string
        default: ''
  nativeedge.datatypes.OrchestratorCertificate:
    properties:
      id:
        description: Unique identifier of the certificate
        required: false
        type: string
      certText:
        description: Certificate text
        required: false
        type: string
      expiration:
        description: Expiration date of the certificate, i.e. 2025-12-18T08:30:02Z
        required: false
        type: string
      format:
        description: Certificate format, i.e. .PEM
        required: false
        type: string
      issuedBy:
        description: The issuer of the certificate
        required: false
        type: string
      issuedOn:
        description: The certificate issue date, i.e. 2024-12-18T08:30:02Z
        required: false
        type: string
      name:
        description: The certificate name
        required: false
        type: string
      purpose:
        description: The certificate purpose
        required: false
        type: string
      type:
        description: The certificate type, i.e. EO-UI
        required: false
        type: string
      valid:
        description: The certificate valid data, i.e. 2024-12-18T08:30:02Z
        required: false
        type: string
  nativeedge.types.VMImageLocation:
    properties:
      secret_name:
        description: Image location secret name
        type: string
        required: false
        default: ''
      method:
        description: Authentication method of the image location
        type: string
        default: none
      protocol:
        description: Image location protocol
        type: string
        default: ''
      resource_path:
        description: Image location resource path
        type: string
        default: ''
      metadata:
        description: Image location metadata
        type: dict
        required: false
  nativeedge.types.UpdateOutcomeClusterEndpoints:
    properties:
      service_tag:
        description: Service tag of the endpoint
        required: true
        type: string
      connection:
        description: Connection status of the endpoint
        required: true
        type: string
      management_ip:
        description: Management IP address of the endpoint
        required: true
        type: string
dsl_definitions:
  vm_config:
    vm_config:
      type: nativeedge.types.VMDeployDefinition
      description: Native edge VM deployment definition
      required: true
  config:
    config:
      type: nativeedge.types.Config
      description: Native edge deployment config
  app_vm_config:
    app_vm_config:
      type: nativeedge.types.AppVMDeploy
      description: Native edge app VM deployment additional definition
      required: true
  binary_image_config:
    binary_image_config:
      type: nativeedge.types.BinaryImageConfig
      description: Archiva binary image request payload
  compose_config:
    compose_config:
      type: nativeedge.types.NativeEdgeComposeConfig
      description: Native edge compose deployment config
  registry_config:
    registry_config:
      type: nativeedge.types.RegistryConfig
      description: Native edge compose deployment config
  oxy_server_packages:
    oxy_server_packages:
      type: nativeedge.datatypes.OxyServerSoftwarePackages
      description: The software packages required for Oxy Server
      required: true
  software_packages:
    software_packages:
      type: nativeedge.datatypes.SoftwarePackages
      description: The software packages downloaded to repository in the orchestrator
      required: true
  client_credentials:
    client_name:
      type: string
      description: The client name generated from orchestrator
      required: false
    client_secret:
      type: string
      description: The client secret generated from orchestrator
      required: false
    certificate:
      type: nativeedge.datatypes.OrchestratorCertificate
      description: The tls certificate of orchestrator
      required: false
  add_outcome_cluster_endpoint:
    name:
      description: Name of the cluster outcome endpoint
      required: false
      type: string
    description:
      description: Description of the cluster outcome endpoint
      required: false
      type: string
    type:
      description: Type of the cluster outcome endpoint
      required: false
      type: string
    cluster_kind:
      description: Cluster kind of the cluster outcome endpoint
      required: false
      type: string
    hostname:
      description: Hostname of the cluster outcome endpoint, i.e. FQDN, IP
      required: false
      type: string
    ip:
      description: IP of the cluster outcome endpoint
      required: false
      type: string
    service_tag:
      description: Service tag of the cluster outcome endpoint
      required: false
      type: string
  patch_outcome_cluster_endpoint:
    service_tag:
      description: Service tag of the cluster outcome endpoint
      required: false
      type: string
    cluster_manager:
      description: URL of the cluster manager
      required: false
      type: string
    cluster_version:
      description: Version of the cluster outcome endpoint
      required: false
      type: string
    endpoints:
      description: List of UpdateOutcomeClusterEndpoints to be added to cluster
      required: false
      type: list
      default: []
      item_type: nativeedge.types.UpdateOutcomeClusterEndpoints
    status:
      description: Status of the cluster
      required: false
      type: string
node_types:
  nativeedge.nodes.template.NativeEdgeVM:
    derived_from: nativeedge.nodes.Root
    properties:
      vm_config:
        type: nativeedge.types.VMDeployDefinition
        description: Native edge VM deployment definition
        required: true
      config:
        type: nativeedge.types.Config
        description: Native edge deployment config
    interfaces:
      nativeedge.interfaces.lifecycle:
        precreate:
          implementation: nativeedge.nativeedge_plugin.tasks.precreate
        create:
          implementation: nativeedge.nativeedge_plugin.tasks.create
          max_retries: 1000
        start:
          implementation: nativeedge.nativeedge_plugin.tasks.start
        poststart:
          implementation: nativeedge.nativeedge_plugin.tasks.poststart
        stop:
          implementation: nativeedge.nativeedge_plugin.tasks.stop
        restart:
          implementation: nativeedge.nativeedge_plugin.tasks.restart
        suspend:
          implementation: nativeedge.nativeedge_plugin.tasks.suspend
        resume:
          implementation: nativeedge.nativeedge_plugin.tasks.resume
        check_drift:
          implementation: nativeedge.nativeedge_plugin.tasks.check_drift
        update_config:
          implementation: nativeedge.nativeedge_plugin.tasks.update_config
        update_apply:
          implementation: nativeedge.nativeedge_plugin.tasks.update_apply
          max_retries: 360
        delete:
          implementation: nativeedge.nativeedge_plugin.tasks.delete
  nativeedge.nodes.template.ApplicationVM:
    derived_from: nativeedge.nodes.template.NativeEdgeVM
    properties:
      config:
        type: nativeedge.types.Config
        description: Native edge deployment config
      app_vm_config:
        type: nativeedge.types.AppVMDeploy
        description: Native edge app VM deployment additional definition
        required: true
      vm_config:
        default: null
    interfaces:
      nativeedge.interfaces.lifecycle:
        precreate:
          implementation: nativeedge.nativeedge_plugin.tasks.precreate_app_vm
        create:
          implementation: nativeedge.nativeedge_plugin.tasks.create_app_vm
          max_retries: 1000
  nativeedge.nodes.template.NativeEdgeCompose:
    derived_from: nativeedge.nodes.Root
    properties:
      compose_config:
        type: nativeedge.types.NativeEdgeComposeConfig
        description: Native edge compose deployment config
    interfaces:
      nativeedge.interfaces.lifecycle:
        precreate:
          implementation: nativeedge.nativeedge_plugin.tasks.precreate_compose
        create:
          implementation: nativeedge.nativeedge_plugin.tasks.create_compose
        delete:
          implementation: nativeedge.nativeedge_plugin.tasks.delete_compose
        start:
          implementation: nativeedge.nativeedge_plugin.tasks.start_compose
        stop:
          implementation: nativeedge.nativeedge_plugin.tasks.stop_compose
        restart:
          implementation: nativeedge.nativeedge_plugin.tasks.restart_compose
        update:
          implementation: nativeedge.nativeedge_plugin.tasks.update_compose
        check_drift:
          implementation: nativeedge.nativeedge_plugin.tasks.compose_check_drift
        poststart:
          implementation: nativeedge.nativeedge_plugin.tasks.poststart_compose
  nativeedge.nodes.template.BinaryImage:
    derived_from: nativeedge.nodes.Root
    properties:
      config:
        type: nativeedge.types.Config
        description: Native edge deployment config
      binary_image_config:
        type: nativeedge.types.BinaryImageConfig
        description: Archiva binary image request payload
    interfaces:
      nativeedge.interfaces.lifecycle:
        precreate:
          implementation: nativeedge.nativeedge_plugin.tasks.validate_binary_image_config
        create:
          implementation: nativeedge.nativeedge_plugin.tasks.upload_binary
          max_retries: 1000
        check_drift:
          implementation: nativeedge.nativeedge_plugin.tasks.binary_check_drift
  nativeedge.nodes.template.RegistryLogin:
    derived_from: nativeedge.nodes.Root
    properties:
      registry_config:
        type: nativeedge.types.RegistryConfig
        description: Native edge compose deployment config
      service_tag:
        description: ECE service tag
        type: string
    interfaces:
      nativeedge.interfaces.lifecycle:
        precreate:
          implementation: nativeedge.nativeedge_plugin.tasks.validate_registry_config
        create:
          implementation: nativeedge.nativeedge_plugin.tasks.registry_login
  nativeedge.nodes.template.Config:
    derived_from: nativeedge.nodes.Root
    properties:
      config:
        type: nativeedge.types.Config
        description: Native edge deployment config
  nativeedge.nodes.template.OxyServerSoftwarePackages:
    derived_from: nativeedge.nodes.Root
    properties:
      oxy_server_packages:
        type: nativeedge.datatypes.OxyServerSoftwarePackages
        description: The software packages required for Oxy Server
        required: true
    interfaces:
      nativeedge.interfaces.lifecycle:
        create:
          implementation: nativeedge.nativeedge_plugin.tasks.download_software
  nativeedge.nodes.template.SoftwarePackages:
    derived_from: nativeedge.nodes.Root
    properties:
      software_packages:
        type: nativeedge.datatypes.SoftwarePackages
        description: The software packages downloaded to repository in the orchestrator
        required: true
    interfaces:
      nativeedge.interfaces.lifecycle:
        create:
          implementation: nativeedge.nativeedge_plugin.tasks.download_software
  nativeedge.nodes.template.ClientCredentials:
    derived_from: nativeedge.nodes.Root
    properties:
      client_name:
        type: string
        description: The client name generated from orchestrator
        required: false
      client_secret:
        type: string
        description: The client secret generated from orchestrator
        required: false
      certificate:
        type: nativeedge.datatypes.OrchestratorCertificate
        description: The tls certificate of orchestrator
        required: false
    interfaces:
      nativeedge.interfaces.lifecycle:
        precreate:
          implementation: nativeedge.nativeedge_plugin.tasks.generate_client_secret
        create:
          implementation: nativeedge.nativeedge_plugin.tasks.get_certificate
  nativeedge.nodes.template.License:
    derived_from: nativeedge.nodes.Root
    properties:
      is_dynamic:
        type: boolean
        description: A boolean flag to indicate whether dynamic license or not
        required: false
        default: false
      license_file:
        type: string
        description: The static license file content, is required if is_dynamic is
          false
        required: false
        default: ''
      entitlements:
        type: dict
        description: License apply result
        required: false
        default: {}
    interfaces:
      nativeedge.interfaces.validation:
        create:
          implementation: nativeedge.nativeedge_plugin.tasks.apply_license
  nativeedge.nodes.template.OutcomeClusterEndpoint:
    derived_from: nativeedge.nodes.Root
    properties:
      name:
        description: Name of the cluster outcome endpoint
        required: false
        type: string
      description:
        description: Description of the cluster outcome endpoint
        required: false
        type: string
      type:
        description: Type of the cluster outcome endpoint
        required: false
        type: string
      cluster_kind:
        description: Cluster kind of the cluster outcome endpoint
        required: false
        type: string
      hostname:
        description: Hostname of the cluster outcome endpoint, i.e. FQDN, IP
        required: false
        type: string
      ip:
        description: IP of the cluster outcome endpoint
        required: false
        type: string
      service_tag:
        description: Service tag of the cluster outcome endpoint
        required: false
        type: string
      cluster_manager:
        description: URL of the cluster manager
        required: false
        type: string
      cluster_version:
        description: Version of the cluster outcome endpoint
        required: false
        type: string
      endpoints:
        description: List of UpdateOutcomeClusterEndpoints to be added to cluster
        required: false
        type: list
        default: []
        item_type: nativeedge.types.UpdateOutcomeClusterEndpoints
      status:
        description: Status of the cluster
        required: false
        type: string
    interfaces:
      nativeedge.interfaces.lifecycle:
        create:
          implementation: nativeedge.nativeedge_plugin.tasks.add_outcome_cluster_endpoint
        patch:
          implementation: nativeedge.nativeedge_plugin.tasks.patch_outcome_cluster_endpoint
  nativeedge.nodes.template.RegisterPrivateCloudLicense:
    derived_from: nativeedge.nodes.Root
    properties:
      cswid:
        description: CSWID of the cluster assigned during registration. Pass empty
          string for registration
        required: true
        type: string
      component_name:
        description: Component name of the outcome endpoint. Optional for Register
        required: false
        type: string
      outcome:
        description: Outcome of the cluster outcome endpoint.
        required: false
        type: string
      entitlement_ids:
