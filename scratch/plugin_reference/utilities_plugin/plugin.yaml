plugins:

  plugins_util: &utilities_plugin
    executor: central_deployment_agent
    package_name: utilities-plugin
    package_version: '3.1.4.0'

  plugins_files: *utilities_plugin

  plugins_ftp: *utilities_plugin

  plugins_custom_workflow: *utilities_plugin

  plugins_hooks_workflow: *utilities_plugin

  cloudinit: *utilities_plugin

  configuration: *utilities_plugin

  keys: *utilities_plugin

  suspend: *utilities_plugin

  terminal: *utilities_plugin

  rest: *utilities_plugin

  scalelist: *utilities_plugin

  secrets: *utilities_plugin

  lifecycle_operations: *utilities_plugin

  resources: *utilities_plugin

  iso: *utilities_plugin

data_types:

  dell.datatypes.key:
    properties:
      private_key_path:
        type: string
        required: false
      public_key_path:
        type: string
        default: '~/.ssh/id_rsa.pub'
      key_name:
        type: string
        required: false
      algorithm:
        type: string
        default: 'RSA'
      bits:
        type: integer
        default: 2048
      comment:
        type: string
        required: false
      passphrase:
        type: string
        required: false
      openssh_format:
        type: boolean
        required: false
      unvalidated:
        description: >
          Unvalidated parameters.
        required: false

  dell.datatypes.ftp_auth:
    properties:
      user:
        description: >
          The login credentials for ftp server.
        default: ''
      password:
        description: >
          optional, ftp password
        default: ''
      ip:
        description: >
          optional, device ip
        default: ''
      port:
        description: >
          optional, ftp port
        default: 21
      ignore_host:
        description: >
          optional, ignore host in ftp response
        default: false
      tls:
        description: >
          optional, use tls connection to ftp
        default: false

  dell.datatypes.terminal_auth:
    properties:
      user:
        description: >
          The login credentials for ssh server.
        default: ''
      password:
        description: >
          optional, ssh password
        default: ''
      ip:
        description: >
          optional, device ip
        default: ''
      key_content:
        description: >
          optional, ssh user key
        default: ''
      port:
        description: >
          optional, ssh port
        default: 22
      store_logs:
        description: >
          optional, save communication logs
        default: false
      promt_check:
        description: >
          optional, list of prompts accepted from device, default is "#/$"
        default: []
      warnings:
        description: >
          optional, list of possible warnings without new line
        default: []
      errors:
        description: >
          optional, list of possible errors without new line
        default: []
      criticals:
        description: >
          optional, list of possible criticals without new line
        default: []
      exit_command:
        description: >
          optional, command for close connection, default 'exit'
        default: exit
      smart_device:
        description: >
          optional, use shell extension
        default: false

  dell.datatypes.File:
    properties:
      resource_path:
        type: string
        description: >
          The path relative to the blueprint where the file is stored.
          Currently this must be packaged in the blueprint. An external URI is
          not valid.
        required: true
      file_path:
        type: string
        description: >
          The path on the machine where the file should be saved.
        required: true
      owner:
        type: string
        description: >
          The owner string, such as "centos:wheel"
        required: true
      mode:
        type: integer
        description: >
          The file permissions, such as 777. Must be provided as an integer.
          "0777" and 0777 are not valid. Only 777.
        required: true
      template_variables:
        description: >
          Variables to render Jinja templates.
        required: false
      use_sudo:
        type: boolean
        description: >
          Whether or not to use sudo to move, rename, delete, chown, chmod,
          the file.
        default: false
      allow_failure:
        type: boolean
        description: >
          If the download fails, log the error and continue.
        default: false

  dell.datatypes.CloudInit.SecretProperty:
    properties:
      enabled:
        description: Whether to store values in a secret or not.
        type: boolean
        default: false
        required: false
      prefix:
        type: string
        required: false
        default: ''
        description: |
          The prefix for the name of the secrets.
          This will default to the node instance id.
          Provided, this provided prefix is "prefix", the secret names will be "prefix_resource_config", "prefix_client_config", "prefix_json_config".
      overrides:
        type: dict
        description: Extra parameters to send to the rest client create secret kwargs.
        default: {}
        required: false

node_types:

  dell.nodes.CloudInit.CloudConfig:
    derived_from: dell.nodes.Root
    runtime_properties:
      cloud_config:
        type: string
        description: String representation of the cloud config.
        required: false
      json_config:
        type: string
        description: Dict representation of the cloud config.
        required: false
      resource_config:
        type: string
        description: The current version of the node property.
        required: false
    properties:
      header:
        default: '#cloud-config'
      encode_base64:
        default: false
      secrets:
        type: dell.datatypes.CloudInit.SecretProperty
      resource_config:
        default: {}
    interfaces:
      dell.interfaces.lifecycle:
        create:
          implementation: cloudinit.plugins_cloudinit.tasks.update
        configure:
          implementation: cloudinit.plugins_cloudinit.tasks.update
        start:
          implementation: cloudinit.plugins_cloudinit.tasks.update
        stop:
          implementation: cloudinit.plugins_cloudinit.tasks.update
        delete:
          implementation: cloudinit.plugins_cloudinit.tasks.delete

  dell.nodes.ConfigurationLoader:
    derived_from: dell.nodes.ApplicationServer
    runtime_properties:
      params:
        type: string
        description: JSON or map represenation of the parameters_json.
        required: false
    properties:
      parameters_json:
        default: ''
    interfaces:
      dell.interfaces.lifecycle:
        configure:
          implementation: configuration.plugins_configuration.tasks.load_configuration
          inputs:
            parameters:
              default: { get_property: [SELF, parameters_json] }
            merge_dicts:
              default: false

  dell.nodes.keys.RSAKey:
    derived_from: dell.nodes.Root
    runtime_properties:
      secret_key_name:
        type: string
        description: The name of the secret to create.
        required: false
      secrets_key_owner:
        type: boolean
        description: Indicates if the node created the secret.
        required: false
      private_key_path:
        type: string
        description: Path to the private key file if it was created.
        required: false
      public_key_path:
        type: string
        description: Path to the public key file if it was created.
        required: false
    properties:
      use_secret_store:
        type: boolean
        default: true
      use_secrets_if_exist:
        type: boolean
        description: >
          this flag is able to be true only if use_secret_store is true
          if this property is false the secret for the key value will be
          created, if true then the existing secrets of an existing node
          with same key_name will be used as a key, if this property is true
          and the secrets does not exist they will be created.
        default: false
      key_name:
        type: string
        description: Deprecated. Use resource_config.key_name.
        required: false
      resource_config:
        description: >
          A dictionary of values to pass to configure the key.
        type: dell.datatypes.key
        required: true
    interfaces:
      dell.interfaces.lifecycle:
        create:
          implementation: keys.plugins_ssh_key.operations.create
          inputs:
            store_public_key_material:
              description: >
                Allow the public key material to be stored as a runtime
                property. Recommended.
              type: boolean
              default: true
            store_private_key_material:
              description: >
                Allow the private key material to be stored as a runtime
                property. Not recommended for manager deployments.
              type: boolean
              default: false
        delete:
          implementation: keys.plugins_ssh_key.operations.delete

  dell.nodes.terminal.Raw:
    derived_from: dell.nodes.Root
    runtime_properties:
      _finished_operations:
        type: dict
        description: Operations that have completed.
        required: false
    properties:
      terminal_auth:
        description: >
          terminal credentials, like example:
            user: <user name>
            password: <user password>
            ip: <host name>
        type: dell.datatypes.terminal_auth
    interfaces:
      dell.interfaces.lifecycle:
        create:
          implementation: terminal.plugins_terminal.tasks.run
          inputs: {}
        configure:
          implementation: terminal.plugins_terminal.tasks.run
          inputs: {}
        start:
          implementation: terminal.plugins_terminal.tasks.run
          inputs: {}
        stop:
          implementation: terminal.plugins_terminal.tasks.run
          inputs: {}
        delete:
          implementation: terminal.plugins_terminal.tasks.run
          inputs: {}

  dell.nodes.File:
    derived_from: dell.nodes.Root
    properties:
      resource_config:
        type: dell.datatypes.File
        required: true
    interfaces:
      dell.interfaces.lifecycle:
        create:
          implementation: plugins_files.plugins_files.tasks.create
        delete:
          implementation: plugins_files.plugins_files.tasks.delete

  dell.nodes.ftp:
    derived_from: dell.nodes.Root
    runtime_properties:
      files:
        type: list
        description: List of file names that have been uploaded.
        required: false
    properties:
      resource_config:
        type: dell.datatypes.ftp_auth
        required: true
      raw_files:
        default: {}
        description: >
          list files from blueprint to upload
      files:
        default: {}
        description: >
          list files with content from blueprint to upload
    interfaces:
      dell.interfaces.lifecycle:
        create:
          implementation: plugins_ftp.plugins_ftp.tasks.create
          inputs:
            resource_config:
              default: { get_property: [ SELF, resource_config ] }
            raw_files:
              default: { get_property: [ SELF, raw_files ] }
            files:
              default: { get_property: [ SELF, files ] }
        delete:
          implementation: plugins_ftp.plugins_ftp.tasks.delete
          inputs:
            resource_config:
              default: { get_property: [ SELF, resource_config ] }

  dell.nodes.rest.Requests:
    derived_from: dell.nodes.Root
    properties:
      hosts:
        description: >
          list of hosts name or IP addresses of Rest Servers
        default: []
      host:
        description: >
          host name or IP addresses of Rest Servers
          if list of hosts is not needed single host can be provided by this
          property. NOTE: the 'hosts' property overwirte the 'host' property
        default: []
      port:
        description: >
          port number. When -1 default ports are used
          (80 for ssl = false and 443 for ssl = true)
        type: integer
        default: -1
      ssl:
        description: >
          http or https
        type: boolean
        default: false
      verify:
        description: >
          A boolean which controls whether we verify the server's TLS
          certificate. Supported such values:
          * `True`: default value, check certificaties,
          * `False`: ignore server certificates,
          * `<file path>`: path to certificate on local system,
          * `<certificate content>`: certificate content.
        default: true
      cert:
        description: >
          Supported such values:
          * `None`: default value, ignore client certificates,
          * `<file path>`: path to certificate on local system,
          * `<certificate content>`: certificate content.
        default: null
      timeout:
        description: >
          Timeout value for requests.
        default: null
      proxies:
        description: >
          List of proxies.
        default: {}
      params:
        description: >
          Template parameters. Default is empty dictionary.
        default: {}
    interfaces:
      dell.interfaces.lifecycle:
        create:
          implementation: rest.plugins_rest.tasks.execute
          inputs: &rest_template_inputs
            params:
              description: >
                Template parameters. Default is empty dictionary. Merged
                with params from node properties and has 'ctx' key for
                current action context.
              default: {}
            template_file:
              description: >
                Template path in blueprint directory
              default: ''
            save_path:
              description: >
                Save result to runtime properties key. Default is directly
                save to runtime properties.
              default: false
            prerender:
              description: >
                Prerender template before run calls jinja render=>yaml parse.
                Default is yaml parse=>jinja render.
              default: false
            remove_calls:
              description: >
                Remove calls list from results. Default: save calls in
                runtime properties.
              default: false
            force_rerun:
              description: >
                Rerun operation if on next operation rerun
              default: false
            retry_count:
              description: >
                Rerun count on warning on catched warnigs
              default: 1
            retry_sleep:
              description: >
                Sleep between rerun
              default: 15
        configure:
          implementation: rest.plugins_rest.tasks.execute
          inputs: *rest_template_inputs
        start:
          implementation: rest.plugins_rest.tasks.execute
          inputs: *rest_template_inputs
        stop:
          implementation: rest.plugins_rest.tasks.execute
          inputs: *rest_template_inputs
        delete:
          implementation: rest.plugins_rest.tasks.execute
          inputs: *rest_template_inputs

  dell.nodes.rest.BunchRequests:
    derived_from: dell.nodes.Root
    properties:
      hosts:
        description: >
          list of hosts name or IP addresses of Rest Servers
        default: []
      host:
        description: >
          host name or IP addresses of Rest Servers
          if list of hosts is not needed single host can be provided by this
          property. NOTE: the 'hosts' property overwirte the 'host' property
        default: []
      port:
        description: >
          port number. When -1 default ports are used
          (80 for ssl = false and 443 for ssl = true)
        type: integer
        default: -1
      ssl:
        description: >
          http or https
        type: boolean
        default: false
      verify:
        description: >
          A boolean which controls whether we verify the server's TLS
          certificate. Supported such values:
          * `True`: default value, check certificaties,
          * `False`: ignore server certificates,
          * `<file path>`: path to certificate on local system,
          * `<certificate content>`: certificate content.
        default: true
      cert:
        description: >
          Supported such values:
          * `None`: default value, ignore client certificates,
          * `<file path>`: path to certificate on local system,
          * `<certificate content>`: certificate content.
        default: null
      timeout:
        description: >
          Timeout value for requests.
        default: null
      proxies:
        description: >
          List of proxies.
        default: {}
      params:
        description: >
          Template parameters. Default is empty dictionary.
        default: {}
    interfaces:
      dell.interfaces.lifecycle:
        create:
          implementation: rest.plugins_rest.tasks.bunch_execute
          inputs:
            auth:
              default: {}
            templates:
              default: {}
        configure:
          implementation: rest.plugins_rest.tasks.bunch_execute
          inputs:
            auth:
              default: {}
            templates:
              default: {}
        start:
          implementation: rest.plugins_rest.tasks.bunch_execute
          inputs:
            auth:
              default: {}
            templates:
              default: {}
        stop:
          implementation: rest.plugins_rest.tasks.bunch_execute
          inputs:
            auth:
              default: {}
            templates:
              default: {}
        delete:
          implementation: rest.plugins_rest.tasks.bunch_execute
          inputs:
            auth:
              default: {}
            templates:
              default: {}

  dell.nodes.secrets.Writer:
    derived_from: dell.nodes.Root
    runtime_properties:
      data:
        type: dict
        description: The values of the entries.
        required: false
      do_not_delete:
        type: boolean
        description: The value of the do_not_delete property.
        required: false
    properties:
      entries:
        default: {}
      do_not_delete:
        type: boolean
        default: false
      variant:
        type: string
        required: false
      separator:
        type: string
        required: false
      logs_secrets:
        type: boolean
        default: false
        required: false
      update_if_exists:
        type: boolean
        default: false
        required: false
    interfaces:
      dell.interfaces.lifecycle:
        create:
          implementation: secrets.plugins_secrets.tasks.create
        delete:
          implementation: secrets.plugins_secrets.tasks.delete
      dell.interfaces.operations:
        update:
          implementation: secrets.plugins_secrets.tasks.update

  dell.nodes.secrets.Reader:
    derived_from: dell.nodes.Root
    runtime_properties:
      data:
        type: dict
        description: The values of the entries.
        required: false
    properties:
      keys:
        default: []
      variant:
        type: string
        required: false
      separator:
        type: string
        required: false
    interfaces:
      dell.interfaces.lifecycle:
        create:
          implementation: secrets.plugins_secrets.tasks.read
      dell.interfaces.operations:
        update:
          implementation: secrets.plugins_secrets.tasks.read

  # dell.nodes.resources.Manager
  dell.nodes.resources.List:
    derived_from: dell.nodes.Root
    runtime_properties:
      resource_config:
        type: list
        description: The values of the resource_config node property.
        required: false
      free_resources:
        type: list
        description: Resources which have not been assigned.
        required: false
      reservations:
        type: dict
        description: Resources which have been assigned.
        required: false
      reservation:
        type: string
        description: Queued reservation.
        required: false
    properties:
      resource_config:
        default: []
    interfaces:
      dell.interfaces.lifecycle:
        create: resources.plugins_resources.tasks.create_list
        delete: resources.plugins_resources.tasks.delete_list
      dell.interfaces.operations:
        reserve:
          implementation: resources.plugins_resources.tasks.reserve_list_item
          inputs:
            reservation_id:
              type: string
              default: ''
        return:
          implementation: resources.plugins_resources.tasks.return_list_item
          inputs:
            reservation_id:
              type: string
              default: ''

  # dell.nodes.resources.List
  dell.nodes.resources.ListItem:
    derived_from: dell.nodes.Root
    interfaces:
      dell.interfaces.lifecycle:
        create: resources.plugins_resources.tasks.create_list_item
        delete: resources.plugins_resources.tasks.delete_list_item

  dell.nodes.resources.ModifiedIso:
    derived_from: dell.nodes.Root
    runtime_properties:
      modified_iso_path:
        type: string
        description: The path to the ISO.
        required: false
    properties:
      iso_path:
        type: string
        required: true
        description: >
          The manager path to original iso
      output_iso_path:
        type: string
        required: false
        description: >
          The manager path to output iso
      new_directories:
        default: [ ]
        description: >
          The list of new directories which should be added to file system.
          https://clalancette.github.io/pycdlib/example-walking-iso-filesystem.html
          Must including keys:
            iso_path, rr_name (only for rocky ridge iso), joliet_path (only for joliet iso),
            file_mode (only for rocky ridge iso), udf_path (only for udf iso)
      new_files:
        default: [ ]
        description: >
          The list of new directories which should be added to file system.
          https://clalancette.github.io/pycdlib/example-walking-iso-filesystem.html
          Must including keys:
            iso_path, file_context(context of file),
            rr_name (only for rocky ridge iso), joliet_path (only for joliet iso),
            file_mode (only for rocky ridge iso), udf_path (only for udf iso)
    interfaces:
      dell.interfaces.lifecycle:
        create:
          implementation: iso.plugins_iso.tasks.modify_iso
          inputs: { }
        delete:
          implementation: iso.plugins_iso.tasks.delete_iso
          inputs: { }


relationships:

  dell.relationships.load_from_config:
    derived_from: dell.relationships.depends_on
    target_interfaces:
      dell.interfaces.relationship_lifecycle:
        preconfigure:
          implementation: configuration.plugins_configuration.tasks.load_configuration_to_runtime_properties
          inputs:
            source_config:
              default: { get_attribute: [TARGET , params ]  }

  # reserve/return_item
  dell.relationships.resources.reserve_list_item:
    derived_from: dell.relationships.connected_to
    target_interfaces:
      dell.interfaces.relationship_lifecycle:
        preconfigure:
          implementation: resources.plugins_resources.tasks.reserve_list_item
          inputs:
            resources_list_node_id:
              type: string
              default: ''
        unlink: resources.plugins_resources.tasks.return_list_item

workflows:

  configuration_update:
    mapping: configuration.plugins_configuration.tasks.update
    description: >
      Updates and merges configuration values.
      Use this to apply new settings without replacing the full configuration.
    display_label: Configuration Update
    availability_rules:
      node_instances_active: [ 'all']
      operations_required:
        - dell.interfaces.lifecycle.is_alive
        - dell.interfaces.lifecycle.configure
        - dell.interfaces.relationship_lifecycle.preconfigure
        - dell.interfaces.lifecycle.update
    parameters:
      params:
        description: json string
      configuration_node_id:
        type: node_id
        default: configuration_loader
      merge_dict:
        default: false
      node_types_to_update:
        default:
          - juniper_node_config
          - fortinet_vnf_type

  # suspend/wake up/resume
  suspend:
    mapping: suspend.plugins_suspend.workflows.suspend
    description: >
      Pauses deployment execution. Only available if the node supports suspension.
    display_label: Suspend
    availability_rules:
      node_instances_active: [ 'all']
      operations_required:
        - dell.interfaces.lifecycle.suspend
        - dell.interfaces.freeze.suspend

  resume:
    mapping: suspend.plugins_suspend.workflows.resume
    description: >
      Resumes execution of a previously suspended workflow. 
      Continues from the point where the deployment was paused.
    display_label: Resume
    availability_rules:
      node_instances_active: [ 'all', 'partial']
      operations_required:
        - dell.interfaces.freeze.resume
        - dell.interfaces.lifecycle.resume

  # force to dump native usage by cloud providers
  statistics:
    mapping: suspend.plugins_suspend.workflows.statistics
    description: >
      Returns system usage and performance statistics.
      Includes resource utilization and runtime metrics.
    display_label: Statistics
    availability_rules:
      node_instances_active: [ 'all']
      operations_required:
        - dell.interfaces.statistics.perfomance

  # backup related workflows
  backup:
    mapping: suspend.plugins_suspend.workflows.backup
    description: >
      Creates a backup of the manager's data.
      Use this to save the current system state for later recovery.
    display_label: Backup
    availability_rules:
      node_instances_active: [ 'all', 'partial']
      operations_required:
        - dell.interfaces.freeze.fs_prepare
        - dell.interfaces.snapshot.create
        - dell.interfaces.freeze.fs_finalize
    parameters:
      snapshot_name:
        description: >
          Backup name/tag.
        default: ""
      snapshot_incremental:
        description: >
          Create incremental snapshots or full backup.
          By default created snapshots.
        default: true
      snapshot_type:
        description: >
          The backup type, like 'daily' or 'weekly'.
        default: irregular
      snapshot_rotation:
        description: >
          How many backups to keep around.
        default: 1

  restore:
    mapping: suspend.plugins_suspend.workflows.restore
    description: >
      Restores the manager from a previously created backup.
      Overwrites the current state with saved data.
    display_label: Restore
    availability_rules:
      node_instances_active: ['partial', 'none']
      operations_required:
        - dell.interfaces.freeze.fs_prepare
        - dell.interfaces.snapshot.apply
        - dell.interfaces.freeze.fs_finalize
    parameters:
      snapshot_name:
        description: >
          Backup name/tag.
        default: ""
      snapshot_incremental:
        description: >
          Create incremental snapshots or full backup.
          By default created snapshots.
        default: true

  # some cloud's parially lock vm's reconfigure if we have backup
  # so better remove before reconfigure
  remove_backup:
    mapping: suspend.plugins_suspend.workflows.remove_backup
    description: >
      Deletes a saved backup if the operation is supported.
      Use this to free storage or clean up old backups.
    display_label: Remove Backup
    parameters:
      snapshot_name:
        description: >
          Backup name/tag.
        default: ""
      snapshot_incremental:
        description: >
          Create incremental snapshots or full backup.
          By default created snapshots.
        default: true

  scaleuplist:
    mapping: scalelist.plugins_scalelist.workflows.scaleuplist
    description: >
      Adds instances to specified nodes in bulk.
      Use this to scale out selected node types.
    display_label: Scale Up List
    availability_rules:
      node_instances_active: [ 'all', 'partial']
    parameters:
      scalable_entity_properties:
        description: >
          List properties for nodes
        default: {}
      scale_compute:
        description: >
            If a node name is passed as the `scalable_entity_properties` parameter
            and that node is contained (transitively) within a compute node
            and this property is 'true', operate on the compute node instead
            of the specified node.
        default: false
      ignore_failure:
        default: false
        type: boolean
      ignore_rollback_failure:
        default: true
        type: boolean
      scale_transaction_field:
        type: string
        default: _transaction_id
        description: >
           Place to save transaction id created in same transaction.
      scale_transaction_value:
        type: string
        default: ""
        description: >
           Optional, transaction value.
      node_sequence:
        default: false
        description: >
          Optional, sequence of nodes for run for override relationships.
      rollback_on_failure:
        default: true
        type: boolean
        description: >
          Optional, rollback the deployment modification on failure.

  scaledownlist:
    mapping: scalelist.plugins_scalelist.workflows.scaledownlist
    description: >
      Removes instances from specified nodes in bulk.
      Use this to scale in selected node types.
    display_label: Scale Down List
    availability_rules:
      node_instances_active: [ 'all', 'partial']
    parameters:
      scale_compute:
        description: >
            If a node name is passed as the `scale_node_name` parameter
            and that node is contained (transitively) within a compute node
            and this property is 'true', operate on the compute node instead
            of the specified node.
        default: false
      ignore_failure:
        default: false
        type: boolean
      scale_transaction_field:
        type: string
        default: _transaction_id
        description: >
           Place to save transaction id created in same transaction.
           Optional, can be skiped if we need to remove instance without
           relation to initial transaction.
      scale_node_name:
        type: string
        default: ""
        description: >
          A list of node ids. The operation will be executed only on node
          instances which are instances of these nodes. An empty list means
          no filtering will take place and all nodes are valid (Default: "").
      scale_node_field:
        default: ""
        description: >
          Node runtime properties field name for search value, supported search
          by ['a', 'b'] on {'a': {'b': 'c'}} return 'c'
      scale_node_field_value:
        default: ""
        description: >
          Node runtime properties field value for search. Can be provided
          as list of possible values.
      force_db_cleanup:
        default: false
        description: >
          Run DB cleanup directly if instances can't be deleted in one
          transaction.
          **This flag will do nothing as of 1.11.0. Deprecated feature.**
      all_results:
        default: false
        description: >
          Get all instances for filter. Required 4.3+ manager.
      node_sequence:
        default: false
        description: >
          Optional, sequence of nodes for run for override relationships.
      force_remove:
        default: true
        type: boolean
        description: >
          Optional, force remove node instances set for scale down based on
          transaction field.
      rollback_on_failure:
        default: true
        type: boolean
        description: >
          Optional, rollback the deployment modification on failure.

  update_operation_filtered:
    mapping: scalelist.plugins_scalelist.workflows.execute_operation
    description: >
      Updates workflow operations using filters and parameters.
      Used to control which operations run and how they're applied.
    display_label: Update Operation Filtered
    availability_rules:
      node_instances_active: [ 'all', 'partial']
    parameters:
      operation:
        type: string
        default: dell.interfaces.lifecycle.update
        description: >
          The name of the operation to execute
          (Default: dell.interfaces.lifecycle.update).
      operation_kwargs:
        default: {}
        description: >
          A dictionary of keyword arguments that will be passed to the
          operation invocation (Default: {}).
      allow_kwargs_override:
        default: null
        description: >
          A boolean describing whether overriding operations inputs defined in
          the blueprint by using inputs of the same name in the
          operation_kwargs parameter is allowed or not (Default: null [means
          that the default behavior, as defined by the workflows
          infrastructure, will be used]).
      run_by_dependency_order:
        default: false
        description: >
          A boolean describing whether the operation should execute on the
          relevant nodes according to the order of their relationships
          dependencies or rather execute on all relevant nodes in parallel
          (Default: false).
      type_names:
        default: []
        description: >
          A list of type names. The operation will be executed only on node
          instances which are of these types or of types which (recursively)
          derive from them. An empty list means no filtering will take place
          and all type names are valid (Default: []).
      node_ids:
        type: list
        item_type: node_id
        default: []
        description: >
          A list of node ids. The operation will be executed only on node
          instances which are instances of these nodes. An empty list means
          no filtering will take place and all nodes are valid (Default: []).
      node_instance_ids:
        type: list
        item_type: node_instance
        default: []
        description: >
          A list of node instance ids. The operation will be executed only on
          the node instances specified. An empty list means no filtering will
          take place and all node instances are valid (Default: []).
      node_field:
        default: ""
        description: >
          Node runtime properties field name for search value, supported search
          by ['a', 'b'] on {'a': {'b': 'c'}} return 'c'
      node_field_value:
        default: ""
        description: >
         Node runtime properties field value for search. Can be provided as
         list of possible values.

  hook_workflow_run_filtered:
