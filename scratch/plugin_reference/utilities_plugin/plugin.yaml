        default: {}
      filter_by:
        description: >
          key-value list, where:
            path is path to field for validate,
            values is list of possible values
          example:
          - path: ["workflow_id"]
            values: ["install"]
          - path: ["deployment_capabilities", "autouninstall", "value"]
