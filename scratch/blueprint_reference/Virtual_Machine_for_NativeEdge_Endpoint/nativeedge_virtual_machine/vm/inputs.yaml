inputs:

  ned_deployment_id:
    type: deployment_id
    hidden: false
    allow_update: false
    display_label: 'Endpoint - Service Tag'
    required: false
    description: |
      The Endpoint where the Virtual Machine will be created.
      For NativeEdge Endpoint: choose one of OnboardECE deployments.
    constraints:
    - labels:
      - cloud: nativeedge

  service_tag:
    type: string
    display_label: Endpoint Service Tag
    description: Service Tag of the Endpoint where Virtual Machine will be created.
    allow_update: false
    required: false
    default: { get_capability: [{get_input: ned_deployment_id}, ece_service_tag ]}
    hidden: true

  name:
    type: string
    display_label: Virtual Machine Name
    description: Virtual Machine name
    allow_update: false
    required: true

  image:
    type: string
    display_label: Image ID
    description: Reference to the Image ID from Artifact Catalog
    allow_update: false

  os_type:
    type: string
    display_label: OS Type
    description: Type of OS running on a Virtual Machine
    allow_update: false
    constraints:
      - valid_values:
        - "UBUNTU16.04-32B"
        - "UBUNTU16.04-64B"
        - "UBUNTU18.04"
        - "UBUNTU20.04"
        - "UBUNTU20.10"
        - "UBUNTU21.04"
        - "UBUNTU21.10"
        - "UBUNTU22.04"
        - "UBUNTU22.10"
        - "UBUNTU23.04"
        - "UBUNTU24.04"
        - "CENTOS9"
        - "CENTOS8"
        - "DEB-LINUX12-32B"
        - "DEB-LINUX12-64B"
        - "DEB-LINUX11-32B"
        - "DEB-LINUX11-64B"
        - "DEB-LINUX10-32B"
        - "DEB-LINUX10-64B"
        - "FREEBSD13-32B"
        - "FREEBSD13-64B"
        - "FREEBSD12-32B"
        - "FREEBSD12-64B"
        - "FREEBSD11-32B"
        - "FREEBSD11-64B"
        - "ORCL-LINUX9"
        - "ORCL-LINUX8"
        - "RHEL9"
        - "RHEL8"
        - "SUSE-SLES15"
        - "SUSE-SLED15"
        - "SUSE-SLES12"
        - "SUSE-SLED12"
        - "LINUX-OTHERS"
        - "OTHERS"

  cpu:
    type: integer
    hidden: false
    allow_update: true
    display_label: vCPUs
    description: Number of virtual CPUs allocated to the Virtual Machine.
    default: 2
    constraints:
      - greater_or_equal: 1

  memory:
    type: string
    hidden: false
    allow_update: true
    display_label: Memory Size
    description: Memory with unit [KB,MB,GB,TB,PB,EB,ZB,YB]
    default: 2GB
    constraints:
      - pattern: '\d+(\.\d+)?(KB|MB|GB|TB|PB|EB|ZB|YB)'
        error_message: |
          Incorrect format.
          Memory size must be followed by unit [KB,MB,GB,TB,PB,EB,ZB,YB].
          Example: 4GB

  storage:
    type: string
    hidden: false
    allow_update: true
    display_label: OS Disk Size
    description: Storage size with unit [KB,MB,GB,TB,PB,EB,ZB,YB]
    default: 50GB
    constraints:
      - pattern: '\d+(\.\d+)?(KB|MB|GB|TB|PB|EB|ZB|YB)'
        error_message: |
          Incorrect format.
          Disk size must be followed by unit [KB,MB,GB,TB,PB,EB,ZB,YB].
          Example: 50GB

  disk_wrapper:
    type: string
    display_label: Endpoint Datastore Path
    required: false
    allow_update: false
    description: >
      Deployment datastore path on target Endpoint.
      Available datastores can be retrieved from inventory service
    constraints:
      - valid_values:
          jmespath:
            - extra.hw_core.storage.dataStoreOrVolumes[?((((type=='SSD'||type=='HDD')&&name.contains(@,'DataStore'))||(shared&&name=='/Shared_DataStore'))&&status=='ONLINE')].mountPath
            - get_inventory:
                get_capability: [{get_input: ned_deployment_id}, ece_service_tag ]

  disk:
    type: string
    display_label: Endpoint Datastore Path
    allow_update: false
    hidden: true
    description: >
      Deployment datastore path on target Endpoint.
      Available datastores can be retrieved from inventory service
    default: { get_input: disk_wrapper }

  disk_controller:
    type: string
    display_label: Disk controller
    allow_update: true
    description: >
      Deployment disk controller.
    default: VIRTIO
    hidden: true
    constraints:
      - valid_values:
          - 'VIRTIO'
          - 'SATA'
          - 'SCSI'

  hardware_options.vTPM:
    type: boolean
    display_label: Hardware Options - vTPM
    description: >
      Enable vTPM. Required for Win11 OS, optional for other OS
    default: false
    required: false
    allow_update: false

  hardware_options.secure_boot:
    type: boolean
    display_label: Hardware Options - Secure Boot
    description: >
      Enable secure boot. Required for Win11 OS, optional for other OS
    default: false
    required: false
    allow_update: false

  hardware_options.firmware_type:
    type: string
    display_label: Hardware Options - Firmware Type
    description: Firmware type. For Win11 OS, it must be UEFI
    default: BIOS
    required: false
    allow_update: false
    constraints:
      - valid_values: [BIOS, UEFI]

  enable_management:
    type: boolean
    display_label: Enable Management
    description: >
      Enable management which will create tap interface for
      infrastructure segment.
      Not recommended to change this value - ECAN will be disabled.
    default: true
    required: false
    allow_update: false

  segment_name:
    type: string
    hidden: false
    required: false
    allow_update: true
    display_label: Bridged Network Name
    description: Name of the Bridged Network.
    constraints:
      - valid_values:
          jmespath:
            - "extra.hw_core.network.virtualSegment[?type=='BRIDGE'].name"
            - get_inventory:
                get_capability: [{get_input: ned_deployment_id}, ece_service_tag ]

  network_settings:
    type: list
    item_type: dell.types.nativeedge.VMDeployNetworkSettings
    hidden: true
    allow_update: true
    display_label: Network Settings
    description: List of VMDeployNetworkSettings.
    default:
      - name: VNIC1
        segment_name:
          get_input: segment_name

  usb_wrapper:
    type: list
    item_type: string
    hidden: false
    allow_update: false
    display_label: USB Devices List
    description: |
      A list of USB logical names to pass through to the Virtual Machine.
      Valid values are "USB-1" to "USB-10"
      Please make sure to select the USB port where USB device is connected.
    required: false
    default: []
    constraints:
      - valid_values:
          jmespath:
            - "extra.hw_core.usbDevice[*].logicalName"
            - get_inventory:
                get_capability: [{get_input: ned_deployment_id}, ece_service_tag ]

  usb:
    type: list
    item_type: string
    hidden: true
    allow_update: false
    display_label: USB Devices List
    description: |
      A list of USB logical names to pass through to the Virtual Machine.
      Valid values are "USB-1" to "USB-10"
      Please make sure to select the USB port where USB device is connected.
    required: false
    default: { get_input: usb_wrapper }

  serial_port_wrapper:
    type: list
    item_type: string
    hidden: false
    allow_update: false
    display_label: Serial Port
    description: |
      Serial port passthrough.
      Please make sure to select the port where required device is connected.
      Example:
        - {"port": "COM-1"}
        - {"port": "COM-2"}
    required: false
    default: []
    constraints:
      - valid_values:
          jmespath:
            - '[extra.hw_core.serialPorts[*].{"port":logicalName,"mode":`RS-232`}[*].values(@).join(`_`,@)[],extra.hw_core.serialPorts[*].{"port":logicalName,"mode":`RS-422`}[*].values(@).join(`_`,@)[],extra.hw_core.serialPorts[*].{"port":logicalName,"mode":`RS-485`}[*].values(@).join(`_`,@)[]][]'
            - get_inventory:
                get_capability: [{get_input: ned_deployment_id}, ece_service_tag ]

  serial_port:
    type: list
    item_type: string
    hidden: true
    allow_update: false
    display_label: Serial Port
    description: |
      Serial port passthrough.
      Please make sure to select the port where required device is connected.
      Example:
        - {"port": "COM-1"}
        - {"port": "COM-2"}
    required: false
    default: { get_input: serial_port_wrapper }

  gpu_wrapper:
    type: list
    item_type: string
    hidden: false
    allow_update: false
    display_label: GPU Passthrough
    description: |
      A list of GPU logical names.
      Please make sure to select the GPU that is currently available in your
      Endpoint. A list of GPU logical names available for your endpoint can
      be found in the NativeEdge UI under Endpoints / Hardware / Peripherals
    required: false
    default: []
    constraints:
      - valid_values:
          jmespath:
            - "extra.hw_core.pciDevice[?deviceType=='GPU'].logicalName"
            - get_inventory:
                get_capability: [{get_input: ned_deployment_id}, ece_service_tag ]

  gpu:
    type: list
    item_type: string
    hidden: true
    allow_update: false
    display_label: GPU Passthrough
    description: |
      A list of GPU logical names.
      Please make sure to select the GPU that is currently available in your
      Endpoint. A list of GPU logical names available for your endpoint can
      be found in the NativeEdge UI under Endpoints / Hardware / Peripherals
    required: false
    default: { get_input: gpu_wrapper }

  video_wrapper:
    type: list
    item_type: string
    hidden: false
    allow_update: false
    display_label: Video Passthrough
    description: |
      Video passthrough. A list of Video logical names (string).
      E.g. ['onboarded-controller']
    required: false
    default: []
    constraints:
      - valid_values:
          jmespath:
            - "extra.hw_core.video[*].logicalName"
            - get_inventory:
                get_capability: [{get_input: ned_deployment_id}, ece_service_tag ]

  video:
    type: list
    item_type: string
    hidden: true
    allow_update: false
    display_label: Video Passthrough
    description: |
      Video passthrough. A list of Video logical names (string).
      E.g. ['onboarded-controller']
    required: false
    default: { get_input: video_wrapper }

  pcie:
    type: list
    item_type: string
    hidden: false
    allow_update: false
    display_label: PCIe Passthrough
    description: |
      PCIe passthrough. A list of PCIe logical names (string).
      E.g. ['SUNIX Co., Ltd. Multiport serial controller']
    required: false
    default: []

  cloudinit:
    type: dict
    hidden: false
    display_label: Cloud Init Config
    description: >
      Cloud init cloud config, can be obtained with
      dell.nodes.CloudInit.CloudConfig
    required: false
    default: {}

  iso_files:
    type: list
    item_type: string
    hidden: false
    allow_update: false
    display_label: ISO Files
    description: |
      List ISO files (references to catalog) to be downloaded before
      Virtual Machine provisioning.
    default: []
    required: false

  additional_disks:
    type: list
    hidden: true
    allow_update: false
    display_label: Additional Disks
    description: >
      List additional disks (references to catalog) to be downloaded
      before Virtual Machine provisioning
    required: false
    default: []

  boot_order:
    type: list
    item_type: string
    required: false
    hidden: false
    allow_update: false
    display_label: Boot Order
    description: |
      Boot order of the Virtual Machine.
      If empty no changes will be made.
    default: []
