tosca_definitions_version: dell_1_1

imports:
  - dell/types/types.yaml
  - plugin:edge-plugin
  - plugin:utilities-plugin?version=>=3.1.3.0

node_templates:

  ssh_keys:
    type: dell.nodes.keys.RSAKey
    properties:
      use_secret_store: true
      use_secrets_if_exist: true
      key_name: "edge_key"
      resource_config:
        openssh_format: true
        key_name: "edge_key"
    interfaces:
      dell.interfaces.lifecycle:
        create:
          implementation: keys.ne_ssh_key.operations.create
          inputs:
            store_public_key_material: false
            store_private_key_material: false
        delete: {}

  binary_image:
    type: dell.nodes.nativeedge.template.BinaryImage
    properties:
      binary_image_config:
        artifact:
          path: { get_input: binary_image_url }
          username: { get_input: binary_image_access_user }
          access_token: { get_secret: { get_input: binary_image_access_token } }
        version: { get_input: binary_image_version }
    interfaces:
      dell.interfaces.lifecycle:
        precreate:
          implementation:
            edge.nativeedge_plugin.tasks.validate_binary_image_config
        create:
          implementation:
            edge.nativeedge_plugin.tasks.upload_binary
        delete:
          implementation:
            edge.nativeedge_plugin.tasks.delete_binary

  prep_config:
    type: dell.nodes.ApplicationModule
    interfaces:
      dell.interfaces.lifecycle:
        precreate:
          implementation: vm/scripts/prepare_base_vm_config.py
          executor: central_deployment_agent
          inputs:
            primary_segment: { get_input: segment_name }
            primary_port_forwards: { get_input: port_forward_rules }
            vm_add_nics: { get_input: vm_add_nics }
            use_dhcp: { get_input: use_dhcp }
            static_ip: { get_input: static_ip }
            use_gateway: { get_input: use_gateway }
            gateway: { get_input: gateway }
            use_dns: { get_input: use_dns }
            dns: { get_input: dns }
            vm_hostname: { get_input: vm_hostname }
            vm_user_name: { get_input: vm_user_name }
            vm_password: { get_secret: { get_input: vm_password } }
            ssh_public_key:
              get_secret:
                concat:
                  - get_attribute: [ssh_keys, secret_key_name]
                  - "_public"
            cloudinit_override: { get_input: cloudinit }
    relationships:
      - type: dell.relationships.depends_on
        target: ssh_keys

  base_vm:
    type: dell.nodes.ServiceComponent
    properties:
      resource_config:
        blueprint:
          external_resource: true
          id: { get_input: utility_blueprint_id }
        deployment:
          inputs:
            service_tag: { get_environment_capability: ece_service_tag }
            name: { get_input: vm_name }
            image: { get_attribute: [binary_image, binary_details, extra, artifact_id] }
            os_type: { get_input: os_type }
            cpu: { get_input: vcpus }
            memory: { get_input: memory_size }
            storage: { get_input: os_disk_size }
            disk: { get_input: disk }
            disk_controller: { get_input: disk_controller }
            hardware_options.vTPM: { get_input: hardware_options.vTPM }
            hardware_options.secure_boot: { get_input: hardware_options.secure_boot }
            hardware_options.firmware_type: { get_input: hardware_options.firmware_type }
            enable_management: { get_input: enable_management }
            network_settings: { get_attribute: [prep_config, network_settings] }
            cloudinit: { get_attribute: [prep_config, cloudinit_config] }
            vm_user_name: { get_input: vm_user_name }
            ssh_private_key_secret:
              concat:
                - get_attribute: [ssh_keys, secret_key_name]
                - "_private"
            vm_hostname: { get_input: vm_hostname }
            additional_disks: { get_input: additional_disks }
            usb: { get_input: usb }
            serial_port: { get_input: serial_port }
            gpu: { get_input: gpu }
            video: { get_input: video }
            pcie: { get_input: pcie }
            iso_files: { get_input: iso_files }
            boot_order: { get_input: boot_order }
    relationships:
      - type: dell.relationships.depends_on
        target: prep_config
      - type: dell.relationships.depends_on
        target: binary_image
      - type: dell.relationships.depends_on
        target: ssh_keys
