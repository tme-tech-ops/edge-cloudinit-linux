capabilities:

  service_tag:
    description: Service Tag
    value: { get_property: [vm, vm_config, location] }

  vm_name:
    description: Virtual Machine Name
    value: { get_attribute: [vm, vm_details, name] }

  vm_hostname:
    description: Virtual Machine hostname
    value: { get_input: vm_hostname }

  vm_primary_ip:
    description: Primary NIC IP
    value:
      get_attribute: [ vm_info, capabilities, vm_public_ip ]

  additional_nics:
    description: Additional NIC IPs as [interface:ip, ...] or N/A if none configured
    value:
      get_attribute: [ vm_info, capabilities, additional_nics_ips ]

  tap_interface:
    description: Management (tap) interface IP
    value:
      get_attribute: [ vm_info, capabilities, tap_ip ]

  vm_user_name:
    description: Virtual Machine User Name
    value: { get_input: vm_user_name }

  vm_ssh_private_key:
    description: Virtual Machine SSH Private Key
    value:
      concat:
        - get_attribute: [ ssh_keys, secret_key_name ]
        - "_private"
  
  vm_password_secret:
    description: Virtual Machine Password
    value: { get_secret: { get_input: vm_password } }

