inputs:

### User Defined Inputs ###

## Basic Configuration 
  edge_os_image_secret:
    type: secret_key
    hidden: false
    allow_update: true
    display_label: OS Image Secret for Virtual Machine creation
    description: |
      Secret containing url, username, access_token, and 
      version of the os image.
    constraints:
    - type: binary_configuration
    display:
      group: basic_vm
      index: 1

  os_type:
    type: string
    hidden: false
    allow_update: false
    display_label: OS Type
    description: The virtual machine Operating System.
    default: UBUNTU22.04
    constraints:
      - valid_values:
        - "UBUNTU18.04"
        - "UBUNTU20.04"
        - "UBUNTU22.04"
        - "UBUNTU22.10"
        - "UBUNTU24.04"
        - "DEBIAN-32B"
        - "DEBIAN-64B"
        - "RHEL9"
        - "SUSE-SLES15"
        - "LINUX-OTHER"
    display:
      group: basic_vm
      index: 5

  utility_blueprint_id:
    type: string
    hidden: false
    display_label: Utility VM Blueprint Name
    description: >
      Name of the uploaded edge-cloudinit Utility blueprint.
      Used for both the base VM and additional VM deployments.
    default: edge-cloudinit-utility-vm
    display:
      group: basic_vm
      index: 10

  vm_name:
    type: string
    hidden: false
    display_label: VM Name
    description: |
      Name of the Virtual Machine
    default: edge-cloud-init-01
    display:
      group: basic_vm
      index: 15

  vm_hostname:
    type: string
    hidden: false
    display_label: VM Hostname
    description: |
      Hostname of the Virtual Machine
      Cannot contain characters other than:
      letters (a-z, A-Z), numbers (0-9), or hyphens (-).
      Can be up to 63 characters long.
    constraints:
    - pattern: ^(?!-)[a-zA-Z0-9-]{1,63}(?<!-)$
      error_message: |
        Must be letters (a-z, A-Z), numbers (0-9), or hyphens (-).
        No more than 64 characters.
    - max_length: 64
    default: edgehost
    display:
      group: basic_vm
      index: 20

  vm_user_name:
    type: string
    hidden: false
    allow_update: false
    display_label: VM Username
    description: |
      Username to be used for the virtual machine.
      Cannot contain leading or trailing spaces.
    default: edgeuser
    constraints:
    - pattern: ^(?!\s)(?!.*\s$).*$
      error_message: Cannot contain leading or trailing spaces.
    display:
      group: basic_vm
      index: 25
  
  vm_password:
    type: secret_key
    hidden: false
    display_label: VM Password
    description: |
      Secret key containing the virtual machine username password in SHA-512.
      See example secret in the blueprint zip for details.
    constraints:
    - type: password
    display:
      group: basic_vm
      index: 30

  disk_wrapper:
    type: string
    hidden: false
    display_label: Endpoint DataStore Path
    required: true
    allow_update: false
    description: >
      Deployment datastore path on target Endpoint. (i.e. /DataStore0)
    constraints:
      - valid_values:
          jmespath:
            - extra.hw_core.storage.dataStoreOrVolumes[?((((type=='SSD'||type=='HDD')&&name.contains(@,'DataStore'))||(shared&&name=='/Shared_DataStore'))&&status=='ONLINE')].mountPath
            - get_inventory:
                get_environment_capability: ece_service_tag
    display:
      group: basic_vm
      index: 35
  
  vnic_0_segment_name:
    type: string
    hidden: false
    allow_update: true
    required: true
    display_label: Virtual Network Segment name for Primary Interface
    description: Name of the Virtual Network Segment.
    constraints:
    - valid_values:
        jmespath:
        - extra.hw_core.network.virtualSegment[?type=='NAT'||type=='BRIDGE'].name
        - get_inventory:
            get_environment_capability: ece_service_tag
    display:
      group: basic_vm
      index: 40

  use_dhcp:
    type: boolean
    hidden: false
    display_label: Use DHCP
    description: |
      If false, then static ip must be configured with optional DNS and Gateway.
    default: true
    display:
      group: basic_vm
      index: 45

  static_ip:
    type: string
    hidden: false
    exclusive_with: use_dhcp
    display_label: Static IP in CIDR notation
    description: |
      Static IP Address in CIDR notation that will be assigned to the VM 
      Example: 192.168.0.100/24
    constraints:
    - pattern: '^(?:((25[0-5]|2[0-4]\d|1\d\d|\d{1,2})(\.(25[0-5]|2[0-4]\d|1\d\d|\d{1,2})){3})\/(3[0-2]|[12]?\d)|)$'
      error_message: |
        Invalid format for IP Address in CIDR format.
        Example: 172.16.0.1/16
    required: false
    display:
      group: basic_vm
      index: 50

  use_gateway:
    type: boolean
    hidden: false
    exclusive_with: use_dhcp
    display_label: Use Gateway
    description: |
      If false, Gateway will not be configured
    default: false
    display:
      group: basic_vm
      index: 55

  gateway:
    type: string
    hidden: false
    only_with: use_gateway
    display_label: Gateway IP
    description: IP address of the default gateway.
    required: false
    constraints:
    - pattern: ^((25[0-5]|(2[0-4]|1\d|[1-9]|)\d)\.?\b){4}$|^$
      error_message: |
        Invalid format for IP Address.
        Example: 172.16.0.1
    display:
      group: basic_vm
      index: 60

  use_dns:
    type: boolean
    hidden: false
    exclusive_with: use_dhcp
    display_label: Use DNS
    description: |
      If false, DNS will not be configured
    default: false
    display:
      group: basic_vm
      index: 65

  dns:
    type: list
    hidden: false
    only_with: use_dns
    display_label: DNS Servers
    description: List of DNS servers to use.
    required: false
    default: []
    display:
      group: basic_vm
      index: 70

## Advanced Virtual Machine Configuration

  hardware_options.firmware_type:
    type: string
    hidden: false
    allow_update: false
    display_label: Firmware Type
    description: |
      The firmware type configured in the Virtual Machine.
    default: BIOS
    constraints:
      - valid_values: [BIOS, UEFI]
    display:
      group: adv_vm
      index: 1

  hardware_options.secure_boot:
    type: boolean
    hidden: false
    allow_update: false
    required: false
    display_label: Secure Boot
    description: |
      Enable secure boot.
    default: false
    display:
      group: adv_vm
      index: 5

  hardware_options.vTPM:
    type: boolean
    hidden: false
    allow_update: false
    required: false
    display_label: Add vTPM
    description: |
      Enable vTPM.
      Typically required for Secure Boot.
    default: false
    display:
      group: adv_vm
      index: 10

  vcpus:
    type: integer
    hidden: false
    allow_update: true
    display_label: vCPUs
    description: Number of virtual CPUs allocated to the Virtual Machine.
    default: 2
    constraints:
    - greater_or_equal: 2
    display:
      group: adv_vm
      index: 15

  memory_size:
    type: string
    hidden: false
    allow_update: true
    display_label: Memory Size
    description: Memory size with unit [KB,MB,GB,TB,PB,EB,ZB,YB].
    default: 4GB
    constraints:
    - pattern: '\d+(\.\d+)?(KB|MB|GB|TB|PB|EB|ZB|YB)'
      error_message: |
        Incorrect format.
        Memory size must be followed by unit [KB,MB,GB,TB,PB,EB,ZB,YB].
        Example: 4GB
    display:
      group: adv_vm
      index: 20

  os_disk_size:
    type: string
    hidden: false
    allow_update: true
    display_label: OS Disk Size
    description: Storage size with unit [KB,MB,GB,TB,PB,EB,ZB,YB].
    default: 50GB
    required: true
    constraints:
    - pattern: '\d+(\.\d+)?(KB|MB|GB|TB|PB|EB|ZB|YB)'
      error_message: |
        Incorrect format.
        Disk size must be followed by unit [KB,MB,GB,TB,PB,EB,ZB,YB].
        Example: 50GB
    display:
      group: adv_vm
      index: 25

  disk_controller:
    type: string
    display_label: Disk controller
    allow_update: true
    description: >
      Deployment disk controller.
    default: VIRTIO
    hidden: false
    constraints:
      - valid_values:
          - 'VIRTIO'
          - 'SATA'
          - 'SCSI'
    display:
      group: adv_vm
      index: 30

  add_disks:
    type: boolean
    hidden: false
    allow_update: false
    display_label: Add Disks
    description: |
      Check to add a list of additional disks
    default: false
    display:
      group: adv_vm
      index: 35

  additional_disks:
    type: list
    item_type: additional_disks
    hidden: false
    allow_update: false
    only_with: add_disks
    display_label: Optional list of additional Virtual Disks
    description: >
      List of additional virtual disks to be created.
    required: false
    default: []
    display:
      group: adv_vm
      index: 40
 
  use_nat:
    type: boolean
    hidden: false
    display_label: Enable NAT Port Forwarding
    description: |
      Enable to define NAT Port Forwarding rules (Only use with NAT Segment)
    default: false
    display:
      group: adv_vm
      index: 45

  port_forward_rules:
    type: list
    hidden: false
    only_with: use_nat
    item_type: port_forward_rules
    description: |
      Leave vm_ip blank and fill in host_ip, vm_port, protocol, host_port, and service_type
      Example for SSH: {host_ip:IP_OF_NAT Interface,vm_port:22,protocol:TCP,host_port:9999,service_type:SSH} 
    required: false
    display_label: Port Mapping
    default: []
    display:
      group: adv_vm
      index: 50

  add_nics:
    type: boolean
    hidden: false
    display_label: Add Network Interfaces
    description: |
      Check to add list of additional network interfaces
    default: false
    display:
      group: adv_vm
      index: 55

  vm_add_nics:
    type: list
    item_type: vm_add_nics
    hidden: false
    allow_update: false
    only_with: add_nics
    display_label: Additional Network Interfaces
    description: >
      List of additional NICs (up to 9) beyond the primary NIC.
      Each NIC requires a segment name and network configuration.
    required: false
    default: []
    display:
      group: adv_vm
      index: 60

  use_passthrough:
    type: boolean
    hidden: false
    display_label: Enable device passthrough
    description: |
      Uncheck to define usb, serial, gpu, video, and pcie devices for VM passthrough
    default: false
    display:
      group: adv_vm
      index: 65

  usb_wrapper:
    type: list
    item_type: string
    hidden: false
    only_with: use_passthrough
    allow_update: false
    display_label: USB Device list
    description: >
      A list of USB logical names (string). USB-1 to USB-10 for Passthrough.
    required: false
    constraints:
    - valid_values:
        jmespath:
        - extra.hw_core.usbDevice[*].logicalName
        - get_inventory:
            get_environment_capability: ece_service_tag
    default: []
    display:
      group: adv_vm
      index: 70

  gpu_wrapper:
    type: list
    item_type: string
    hidden: false
    only_with: use_passthrough
    display_label: GPU Passthrough
    description: >
      GPU passthrough. A list of GPU logical names (string). NVIDIA_A2-Slot1 to
      NVIDIA_A2-Slot8, NVIDIA_A30-Slot1 to NVIDIA_A30-Slot8
    required: false
    constraints:
    - valid_values:
        jmespath:
        - "extra.hw_core.pciDevice[?deviceType=='GPU'].logicalName"
        - get_inventory:
            get_environment_capability: ece_service_tag
    default: []
    display:
      group: adv_vm
      index: 75

  pcie_wrapper:
    type: list
    item_type: string
    display_label: PCIe Passthrough
    hidden: false
    only_with: use_passthrough
    description: >
      PCIe passthrough. A list of PCIe logical names.
    required: false
    constraints:
    - valid_values:
        jmespath:
        - extra.hw_core.pciDevice[*].logicalName
        - get_inventory:
            get_environment_capability: ece_service_tag
    default: []
    display:
      group: adv_vm
      index: 80

  video:
    type: list
    item_type: string
    hidden: false
    only_with: use_passthrough
    display_label: Video Passthrough
    description: >
      Video passthrough. A list of Video logical names (string). E.g. 'Onboard
      Controller'
    required: false
    constraints:
    - valid_values:
        - "onboard controller"
    default: []
    display:
      group: adv_vm
      index: 85

  # video: # CANNOT Use jmespath for video controllers, keeping for reference
  #   type: list
  #   item_type: string
  #   hidden: false
  #   only_with: use_passthrough
  #   display_label: Video Passthrough
  #   description: >
  #     Video passthrough. A list of Video logical names (string). E.g. 'Onboard
  #     Controller'
  #   required: false
  #   constraints:
  #   - valid_values:
  #       jmespath:
  #       - extra.hw_core.video[*].logicalName
  #       - get_inventory:
  #           get_environment_capability: ece_service_tag
  #   default: []
  #   display:
  #     group: adv_vm
  #     index: 116

  serial_port_wrapper:
    type: list
    item_type: string
    hidden: false
    only_with: use_passthrough
    allow_update: false
    display_label: Serial Port
    description: |
      Serial port passthrough. PORT_MODE format (e.g. COM-1_RS-232)
    required: false
    default: []
    constraints:
      - valid_values:
          jmespath:
            - '[extra.hw_core.serialPorts[*].{"port":logicalName,"mode":`RS-232`}[*].values(@).join(`_`,@)[],extra.hw_core.serialPorts[*].{"port":logicalName,"mode":`RS-422`}[*].values(@).join(`_`,@)[],extra.hw_core.serialPorts[*].{"port":logicalName,"mode":`RS-485`}[*].values(@).join(`_`,@)[]][]'
            - get_inventory:
                get_environment_capability: ece_service_tag
    display:
      group: adv_vm
      index: 90

### Hidden inputs ###

# Hidden VM

  usb:
    type: list
    item_type: string
    hidden: true
    allow_update: false
    display_label: USB Device list
    description: >
      A list of USB logical names (string). USB-1 to USB-10 for Passthrough.
    required: false
    default: {  get_input: usb_wrapper }

  gpu:
    type: list
    item_type: string
    hidden: true
    allow_update: false
    display_label: GPU Passthrough
    description: >
      GPU passthrough. A list of GPU logical names (string). NVIDIA_A2-Slot1 to
      NVIDIA_A2-Slot8, NVIDIA_A30-Slot1 to NVIDIA_A30-Slot8
    required: false
    default: { get_input: gpu_wrapper }

  pcie:
    type: list
    item_type: string
    display_label: PCIe Passthrough
    hidden: true
    allow_update: false
    description: >
      PCIe passthrough. A list of PCIe logical names.
    required: false
    default: { get_input: pcie_wrapper }

  segment_name:
    type: string
    hidden: true
    allow_update: false
    required: true
    display_label: Virtual Network Segment name for Primary Interface
    description: Name of the Virtual Network Segment.
    default: { get_input: vnic_0_segment_name }

  disk:
    type: string
    display_label: Endpoint Datastore Path
    allow_update: false
    hidden: true
    required: true
    description: >
      Deployment datastore path on target Endpoint.
      Available datastores can be retrieved from inventory service
    default: { get_input: disk_wrapper }

  enable_management:
    type: boolean
    hidden: true
    allow_update: false
    display_label: Enable Management
    description: |
      Enable management which will create a tap interface for
      the infrastructure segment.
    default: true

  cloudinit:
    type: string
    hidden: true
    allow_update: false
    display_label: Cloud Init Config
    description: |
      Cloud init cloud config, can be obtained with
      dell.nodes.CloudInit.CloudConfig
    required: false
    default: ''

  iso_files:
    type: list
    item_type: string
    hidden: true
    allow_update: false
    display_label: ISO Files
    description: |
      List ISO files (references to catalog) to be downloaded before
      Virtual Machine provisioning.
    required: false
    default: []

  serial_port:
    type: list
    item_type: string
    hidden: true
    allow_update: false
    display_label: Serial Port
    description: |
      Serial port passthrough.
      Please make sure to select the port where required device is connected.
      Example:
        - {"port": "COM-1"}
        - {"port": "COM-2"}
    required: false
    default: { get_input: serial_port_wrapper }

  boot_order:
    type: list
    item_type: string
    required: false
    hidden: true
    allow_update: false
    display_label: Boot Order
    description: |
      Boot order of the Virtual Machine.
      If empty no changes will be made.
    default: []

  # port_forward_host_ip: # THIS INPUT IS NOT NEEDED, reference for displaying the default host IP
  #   type: string
  #   hidden: true
  #   allow_update: false
  #   display_label: Endpoint Host IP
  #   description: IP Address of the default host network for port forwarding
  #   constraints:
  #   - valid_values: 
  #       jmespath:
  #       - extra.hw_core.network.hostNetwork[?isDefault==`true`].ipAddress 
  #       - get_inventory:
  #           get_environment_capability: ece_service_tag
  #   required: false

# Hidden Artifact
  binary_image_url:
    type: string
    hidden: true
    allow_update: false
    display_label: Virtual Machine Image Repository URL
    description: |
      URL of the OS Image that will be used to create
      the Virtual Machine.
    default:
      get_secret:
      - get_input: edge_os_image_secret
      - binary_image_url

  binary_image_access_user:
    type: string
    hidden: true
    display_label: Virtual Machine Image Repository User Name
    description: |
      User name of the Repository of the Image Binary that will be
      used to create the Virtual Machine.
    default:
      get_secret:
      - get_input: edge_os_image_secret
      - binary_image_access_user

  binary_image_access_token:
    type: list
    hidden: true
    display_label: Virtual Machine Image Repository Token Secret Name
    description: |
      Name of the secret storing the Token to the Repository of the
      Image Binary that will be used to create the Virtual Machine.
    default:
    - get_input: edge_os_image_secret
    - binary_image_access_token

  binary_image_version:
    type: string
    hidden: true
    display_label: Virtual Machine Image Version
    description: |
      Virtual Machine Image Version that will be used to create
      the Virtual Machine.
    default:
      get_secret:
      - get_input: edge_os_image_secret
      - binary_image_version

# Data types

data_types:
  port_forward_rules:
    properties:
      host_ip:
        type: string
        default: CHANGE TO HOST IP OF NAT VIRTUAL NETWORK SEGMENT
        required: false
        description: Endpoint Host network IP where the NAT VNS resides
      host_port:
        type: string
        required: false
        description: Host tcp/udp port to advertise on
      protocol:
        type: string
        required: false
        description: Protocol ("TCP", "UDP")
        constraints:
          - valid_values: [ TCP, UDP ]
      service_type:
        type: string
        required: false
        description: Service Type ("SSH", "HTTP", "CUSTOM")
        constraints:
          - valid_values: [ SSH, HTTP, CUSTOM ]
      vm_port:
        type: string
        required: false
        description: VM tcp/udp Port to forward
      vm_ip:
        type: string
        required: false
        description: VM IP, only needed when static IP is defined for the VM
  vm_add_nics:
    properties:
      nic_name:
        type: string
        required: true
        default: 'nic2'
        description: >
          A unique label for this NIC entry (e.g. "NIC 2").
          Used to identify each NIC in the configuration list.
        display:
          index: 1
          display_name: NIC Label
      segment_name:
        type: string
        required: true
        default: ''
        description: >
          Name of the Virtual Network Segment to attach this NIC to.
          Must match a segment name configured on the NativeEdge Endpoint.
        display:
          index: 2
          display_name: Segment Name
      use_dhcp:
        type: boolean
        required: true
        default: true
        description: Use DHCP for this NIC. If false, static_ip is required.
        display:
          index: 3
          display_name: Use DHCP
      accept_dhcp_routes:
        type: boolean
        required: false
        default: false
        description: >
          When DHCP is enabled, accept gateway and routes from the DHCP server.
          Default is false (only the primary NIC's DHCP gateway is used).
          Enable only if this NIC's DHCP-offered routes are needed.
        display:
          index: 4
          display_name: Accept DHCP Routes
      static_ip:
        type: string
        required: false
        default: ''
        description: >
          Static IP Address and CIDR prefix (e.g. 192.168.0.100/24).
          Required when Use DHCP is false.
        display:
          index: 5
          display_name: Static IP/CIDR
      use_gateway:
        type: boolean
        required: false
        default: false
        description: >
          Configure a static route for this NIC.
          Requires gateway and route_destination when enabled.
        display:
          index: 6
          display_name: Use Gateway
      gateway:
        type: string
        required: false
        default: ''
        description: Gateway IP address (e.g. 192.168.0.1).
        display:
          index: 7
          display_name: Gateway IP
      route_destination:
        type: string
        required: false
        default: ''
        description: >
          Destination subnet in CIDR for static route (e.g. 10.20.0.0/16).
          Required when Use Gateway is true. Do NOT use 0.0.0.0/0 --
          only the primary NIC should have a default route.
        display:
          index: 8
          display_name: Route Destination (CIDR)
      use_dns:
        type: boolean
        required: false
        default: false
        description: Configure DNS servers for this NIC.
        display:
          index: 9
          display_name: Use DNS
      dns:
        type: string
        required: false
        default: ''
        description: >
          Comma-separated list of DNS server IPs (e.g. 8.8.8.8,8.8.4.4).
        display:
          index: 10
          display_name: DNS Servers
      use_nat:
        type: boolean
        required: false
        default: false
        description: Enable NAT port forwarding for this NIC.
        display:
          index: 11
          display_name: Enable NAT
      port_forward_rules:
        type: string
        required: false
        default: ''
        description: >
          JSON-formatted port forwarding rules as a string.
          Example: [{"host_ip":"10.0.0.1","vm_port":"22","protocol":"TCP","host_port":"9999","service_type":"SSH"}]
        display:
          index: 12
          display_name: Port Forward Rules (JSON)
  additional_disks:
    properties:
      name:
        type: string
        required: true
        default: 'vdisk2'
        description: Unique name to identify the virtual disk.
        display:
          index: 1
          display_name: Name
      disk:
        type: string
        required: true
        default: '/DataStore0'
        description: The /DataStore path where the virtual disk will be created.
        display:
          index: 2
          display_name: Disk Path
      storage:
        type: integer
        required: true
        default: 16
        description: The size of the virtual disk, specified as an integer value.
        display:
          index: 3
          display_name: Storage Size
      storage_unit:
        type: string
        required: true
        default: 'GB'
        description: The unit of measurement for the disk size. Supported values
          [KB,MB,GB,TB,PB,EB,ZB,YB].
        display:
          index: 4
          display_name: Storage Unit
        constraints:
          - valid_values: [ KB, MB, GB, TB, PB, EB, ZB, YB ]
